# OpenHands values for single-cluster-subdomain staging environment
# Subdomain-based routing: each branch/release gets its own subdomain
# Example: my-branch.ohe-staging.platform-team.all-hands.dev
#
# =============================================================================
# PREREQUISITES - Required Secrets
# =============================================================================
# Before deploying, create these secrets with MATCHING values for API keys:
#
# GLOBAL_SECRET=$(openssl rand -hex 32)
#
# # IMPORTANT: sandbox-api-key and default-api-key MUST have the same value!
# kubectl create secret generic sandbox-api-key -n openhands \
#   --from-literal=sandbox-api-key=$GLOBAL_SECRET
# kubectl create secret generic default-api-key -n openhands \
#   --from-literal=default-api-key=$GLOBAL_SECRET
#
# See charts/openhands/README.md for full list of required secrets.
# =============================================================================

# Branch sanitization - set at deploy time via --set
# branchSanitized: "my-branch"  # Set via: helm install --set branchSanitized=my-branch

# Image configuration
image:
  repository: ghcr.io/openhands/enterprise-server
  tag: "cloud-1.22.1"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-login-secret

# Basic deployment settings
deployment:
  replicas: 1
  resources:
    requests:
      memory: 1Gi
      cpu: 100m
    limits:
      memory: 2Gi

# Ingress - subdomain-based routing
# With prefixWithBranch=true, host becomes: {branchSanitized}.{ingress.host}
# e.g., my-feature.ohe-staging.platform-team.all-hands.dev
ingress:
  enabled: true
  host: "ohe-staging.platform-team.all-hands.dev"
  prefixWithBranch: true  # KEY DIFFERENCE: enables subdomain routing
  class: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    traefik.ingress.kubernetes.io/router.tls: "true"
  root:
    annotations: {}
  integrations:
    annotations: {}
  mcp:
    annotations: {}

# TLS enabled with cert-manager
tls:
  enabled: true
  env: staging  # Creates secret: app-all-hands-staging-tls

# Environment variables
env:
  DISABLE_WAITLIST: "true"
  LOG_LEVEL: "INFO"
  SANDBOX_REMOTE_RUNTIME_API_TIMEOUT: "60"
  # Runtime URL pattern for subdomain-based routing
  # NOTE: Override this at deploy time with the actual branch name:
  # --set env.RUNTIME_URL_PATTERN="https://my-branch.ohe-staging.platform-team.all-hands.dev/runtime/{runtime_id}"
  RUNTIME_URL_PATTERN: "https://ohe-staging.platform-team.all-hands.dev/runtime/{runtime_id}"

# Session JWT secret
sessions:
  existingSecret: jwt-secret

# Service account
serviceAccount:
  create: true
  name: openhands-sa

# Database migrations
databaseMigrations:
  waitForDatabase: true
  createDatabases: true
  migrate: true

# Enterprise SSO - enables SAML-based SSO via Keycloak
# When enabled, users can login via "Login with Enterprise SSO" button
# Requires Keycloak to be configured with a SAML identity provider
enterpriseSSO:
  enabled: true

# Disable features not needed for testing
github:
  enabled: false
gitlab:
  enabled: false
slack:
  enabled: false
stripe:
  enabled: false
laminar:
  enabled: false

# Filestore - use ephemeral minio for testing
filestore:
  ephemeral: true
  bucket: openhands-sessions

# Minio configuration for ephemeral storage
minio:
  replicas: 1
  mode: standalone
  persistence:
    enabled: false
  buckets:
    - name: openhands-sessions
      policy: none
      purge: true
  svcaccts:
    - accessKey: "default"
      secretKey: "notasecret"
      user: root
  rootUser: "root"
  rootPassword: "minioadmin"
  resources:
    requests:
      memory: 100Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m

# -----------------------
# Keycloak for authentication
# -----------------------
# NOTE: For multi-branch deployments with shared Keycloak:
# - Set keycloak.enabled: false to use external shared Keycloak
# - Set keycloak.authHost to the shared Keycloak host (without https://)
# - Set keycloak.url to the full URL of the shared Keycloak
#
# For single-branch deployments or testing, enable Keycloak subchart below.
keycloak:
  # Set to false to use shared/external Keycloak instance
  enabled: false
  # URL of the external Keycloak instance
  url: "https://auth.ohe-staging.platform-team.all-hands.dev"
  # authHost overrides AUTH_WEB_HOST env var for shared Keycloak
  # This prevents branch prefix from being added to the auth hostname
  authHost: "auth.ohe-staging.platform-team.all-hands.dev"

# -----------------------
# LiteLLM proxy
# -----------------------
litellm-helm:
  enabled: true
  db:
    useExisting: true
    deployStandalone: false
    endpoint: openhands-postgresql
    database: litellm
    secret:
      name: postgres-password
      usernameKey: username
      passwordKey: password
  ingress:
    enabled: false  # Access via internal service only
  masterkeySecretName: lite-llm-api-key
  masterkeySecretKey: lite-llm-api-key
  migrationJob:
    enabled: false
  environmentSecrets: []
  proxy_config:
    environment_variables:
      OR_APP_NAME: OpenHands
      OR_SITE_URL: https://docs.all-hands.dev
    litellm_settings:
      num_retries: 3
      request_timeout: 600
    model_list:
      - model_name: default
        litellm_params:
          model: openai/gpt-4o-mini
          api_key: sk-placeholder-key  # Replace with real API key

# LiteLLM internal URL
litellm:
  url: "http://litellm-helm:4000"
  teamId: "openhands"

# -----------------------
# PostgreSQL
# -----------------------
postgresql:
  enabled: true
  fullnameOverride: openhands-postgresql
  auth:
    username: postgres
    existingSecret: postgres-password
    secretKeys:
      adminPasswordKey: password
  primary:
    initdb:
      scriptsConfigMap: ""
    persistence:
      enabled: true
      size: 10Gi
  service:
    ports:
      postgresql: 5432
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "latest"

# -----------------------
# Redis
# -----------------------
redis:
  enabled: true
  fullnameOverride: openhands-redis
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi
  replica:
    replicaCount: 0
  resources:
    requests:
      memory: 100Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: "latest"

# -----------------------
# Runtime API configuration
# -----------------------
runtime-api:
  enabled: true
  replicaCount: 1
  runtimeInSameCluster: true
  imagePullSecrets:
    - name: ghcr-login-secret
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: Always
    runAsNonRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      memory: 1Gi
  # Warm runtimes - keep 1 ready for fast startup
  warmRuntimes:
    enabled: true
    count: 1
    configs:
      - name: default
        image: "ghcr.io/openhands/runtime:cloud-1.22.1-nikolaik"
        working_dir: "/openhands/code/"
        environment: {}
        command:
          - /openhands/micromamba/bin/micromamba
          - run
          - -n
          - openhands
          - poetry
          - run
          - python
          - -u
          - -m
          - openhands.runtime.action_execution_server
          - "60000"
          - --working-dir
          - /workspace
          - --plugins
          - agent_skills
          - jupyter
          - vscode
          - --username
          - root
          - --user-id
          - "0"
  databaseMigrations:
    waitForDatabase: true
    createDatabases: true
    migrate: true
  postgresql:
    auth:
      username: postgres
      existingSecret: postgres-password
  externalDatabase:
    enabled: false
    existingSecret: postgres-password
  # Runtime API ingress - subdomain-based
  ingress:
    enabled: true
    host: "ohe-staging.platform-team.all-hands.dev"
    prefixWithBranch: true  # Each branch gets subdomain: {branch}.ohe-staging...
    path: /runtime
    pathType: Prefix
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns01
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls: true
    tlsSecretName: app-all-hands-staging-tls
  # Pass branchSanitized to runtime-api for subdomain routing
  # Set via: helm install --set branchSanitized=my-branch --set runtime-api.branchSanitized=my-branch
  # branchSanitized: "my-branch"
  env:
    DB_HOST: openhands-postgresql
    DB_USER: postgres
    DB_NAME: runtime_api_db
    K8S_NAMESPACE: "openhands"
    RUNTIME_CLASS: ""
    # NOTE: For branch deployments, override RUNTIME_BASE_URL with branch prefix:
    # --set runtime-api.env.RUNTIME_BASE_URL=my-branch.ohe-staging.platform-team.all-hands.dev
    RUNTIME_BASE_URL: "ohe-staging.platform-team.all-hands.dev"
    RUNTIME_DISABLE_SSL: "false"
    MEMORY_REQUEST: "2048Mi"
    MEMORY_LIMIT: "2048Mi"
    CPU_REQUEST: "500m"
    EPHEMERAL_STORAGE_SIZE: "10Gi"

# Runtime image configuration
runtime:
  image:
    repository: ghcr.io/openhands/runtime
    tag: cloud-1.22.1-nikolaik
  runAsRoot: true

# Sandbox configuration
# IMPORTANT: apiHostname must match the runtime-api service name
# Format: http://{release-name}-runtime-api:5000
# When deployed as 'openhands', the service is 'openhands-runtime-api'
sandbox:
  apiHostname: "http://openhands-runtime-api:5000"

# -----------------------
# Automation - disabled for initial testing
# -----------------------
automation:
  enabled: false

# Replicated - disabled (not using Replicated)
replicated:
  enabled: false
