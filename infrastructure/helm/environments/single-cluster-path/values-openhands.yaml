# OpenHands values for single-cluster-path staging environment
# Path-based routing: all services on same host with different URL paths

# Image configuration
image:
  repository: ghcr.io/openhands/enterprise-server
  tag: "cloud-1.22.1"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-login-secret

# Basic deployment settings
deployment:
  replicas: 1
  resources:
    requests:
      memory: 1Gi
      cpu: 100m
    limits:
      memory: 2Gi

# Ingress - path-based routing (all paths on same host)
ingress:
  enabled: true
  host: "34.46.229.222.nip.io"  # Using nip.io for testing without DNS
  class: traefik
  annotations: {}
  root:
    annotations: {}
  integrations:
    annotations: {}
  mcp:
    annotations: {}

# TLS disabled for initial testing
tls:
  enabled: false

# Environment variables
env:
  DISABLE_WAITLIST: "true"
  LOG_LEVEL: "INFO"
  SANDBOX_REMOTE_RUNTIME_API_TIMEOUT: "60"
  # Runtime URL pattern for path-based routing
  RUNTIME_URL_PATTERN: "http://34.46.229.222.nip.io/runtime/{runtime_id}"

# Session JWT secret
sessions:
  existingSecret: jwt-secret

# Service account
serviceAccount:
  create: true
  name: openhands-sa

# Database migrations
databaseMigrations:
  waitForDatabase: true
  createDatabases: true
  migrate: true

# Disable features not needed for testing
github:
  enabled: false
gitlab:
  enabled: false
slack:
  enabled: false
stripe:
  enabled: false
laminar:
  enabled: false

# Filestore - use ephemeral minio for testing
filestore:
  ephemeral: true
  bucket: openhands-sessions

# Minio configuration for ephemeral storage
minio:
  replicas: 1
  mode: standalone
  persistence:
    enabled: false
  buckets:
    - name: openhands-sessions
      policy: none
      purge: true
  svcaccts:
    - accessKey: "default"
      secretKey: "notasecret"
      user: root
  rootUser: "root"
  rootPassword: "minioadmin"
  resources:
    requests:
      memory: 100Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m

# -----------------------
# Keycloak for authentication
# -----------------------
keycloak:
  enabled: true
  url: "http://keycloak"
  fullnameOverride: keycloak
  replicaCount: 1
  production: false  # Use dev mode for easier testing
  proxyHeaders: forwarded
  ingress:
    enabled: true
    hostname: "34.46.229.222.nip.io"
    path: /auth
    pathType: Prefix
    servicePort: 80
    tls: false
    ingressClassName: traefik
  auth:
    adminUser: admin
    existingSecret: keycloak-admin
    passwordSecretKey: admin-password
  service:
    type: ClusterIP
  serviceAccount:
    name: "keycloak-sa"
  postgresql:
    enabled: false
  externalDatabase:
    host: openhands-postgresql
    database: bitnami_keycloak
    existingSecret: postgres-password
    existingSecretUserKey: username
    existingSecretPasswordKey: password
  extraEnvVars:
    - name: KC_FEATURES
      value: token-exchange,admin-fine-grained-authz
    - name: KC_HTTP_ENABLED
      value: "true"
    - name: KC_PROXY_HEADERS
      value: "xforwarded"
    - name: KC_HTTP_RELATIVE_PATH
      value: "/auth"
    - name: KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_LEGACY_LOGOUT_REDIRECT_URI
      value: "true"
  image:
    registry: docker.io
    repository: bitnami/keycloak
    tag: "latest"
  waitForDb:
    image: "bitnami/postgresql:latest"
  initContainers:
    - name: wait-for-db
      image: '{{ .Values.waitForDb.image }}'
      command: ['sh', '-c']
      args:
        - |
          echo "Waiting for database at $KEYCLOAK_DATABASE_HOST:$KEYCLOAK_DATABASE_PORT..."
          until PGPASSWORD=$DB_PASS pg_isready -h "$KEYCLOAK_DATABASE_HOST" -p "$KEYCLOAK_DATABASE_PORT" -U "$DB_USER" > /dev/null 2>&1; do
            echo "PostgreSQL is unavailable - sleeping 5s"
            sleep 5
          done
          echo "PostgreSQL is ready!"
      envFrom:
        - configMapRef:
            name: keycloak-env-vars
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-password
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-password
              key: password

# -----------------------
# LiteLLM proxy - DISABLED for initial testing
# -----------------------
litellm-helm:
  enabled: false

# LiteLLM URL (point to external or enable litellm-helm)
litellm:
  url: "http://localhost:4000"  # Placeholder - will need real LLM proxy
  teamId: "openhands"

# -----------------------
# PostgreSQL
# -----------------------
postgresql:
  enabled: true
  fullnameOverride: openhands-postgresql
  auth:
    username: postgres
    existingSecret: postgres-password
    secretKeys:
      adminPasswordKey: password
  primary:
    initdb:
      scriptsConfigMap: ""
    persistence:
      enabled: true
      size: 10Gi
  service:
    ports:
      postgresql: 5432
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "latest"

# -----------------------
# Redis
# -----------------------
redis:
  enabled: true
  fullnameOverride: openhands-redis
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi
  replica:
    replicaCount: 0
  resources:
    requests:
      memory: 100Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: "latest"

# -----------------------
# Runtime API configuration
# -----------------------
runtime-api:
  enabled: true
  replicaCount: 1
  runtimeInSameCluster: true
  imagePullSecrets:
    - name: ghcr-login-secret
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: Always
    runAsNonRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      memory: 1Gi
  # Warm runtimes - keep 1 ready for fast startup
  warmRuntimes:
    enabled: true
    count: 1
    configs:
      - name: default
        image: "ghcr.io/openhands/runtime:cloud-1.22.1-nikolaik"
        working_dir: "/openhands/code/"
        environment: {}
        command:
          - /openhands/micromamba/bin/micromamba
          - run
          - -n
          - openhands
          - poetry
          - run
          - python
          - -u
          - -m
          - openhands.runtime.action_execution_server
          - "60000"
          - --working-dir
          - /workspace
          - --plugins
          - agent_skills
          - jupyter
          - vscode
          - --username
          - root
          - --user-id
          - "0"
  databaseMigrations:
    waitForDatabase: true
    createDatabases: true
    migrate: true
  postgresql:
    auth:
      username: postgres
      existingSecret: postgres-password
  externalDatabase:
    enabled: false
    existingSecret: postgres-password
  # Runtime API ingress - path-based
  ingress:
    enabled: true
    host: "34.46.229.222.nip.io"
    path: /runtime
    pathType: Prefix
    className: traefik
    annotations: {}
    tls: false
  env:
    DB_HOST: openhands-postgresql
    DB_USER: postgres
    DB_NAME: runtime_api_db
    K8S_NAMESPACE: "openhands"
    RUNTIME_CLASS: ""
    RUNTIME_BASE_URL: "34.46.229.222.nip.io"
    RUNTIME_DISABLE_SSL: "true"
    MEMORY_REQUEST: "2048Mi"
    MEMORY_LIMIT: "2048Mi"
    CPU_REQUEST: "500m"
    EPHEMERAL_STORAGE_SIZE: "10Gi"

# Runtime image configuration
runtime:
  image:
    repository: ghcr.io/openhands/runtime
    tag: cloud-1.22.1-nikolaik
  runAsRoot: true

# Sandbox configuration
sandbox:
  apiHostname: "http://runtime-api-runtime-api:5000"

# -----------------------
# Automation - disabled for initial testing
# -----------------------
automation:
  enabled: false

# Replicated - disabled (not using Replicated)
replicated:
  enabled: false
