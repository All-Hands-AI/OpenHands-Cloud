# OpenHands values for single-cluster-path staging environment
# Path-based routing: all services on same host with different URL paths

# Image configuration
image:
  repository: ghcr.io/openhands/enterprise-server
  tag: "cloud-1.22.1"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-login-secret

# Basic deployment settings
deployment:
  replicas: 1
  resources:
    requests:
      memory: 1Gi
      cpu: 100m
    limits:
      memory: 2Gi

# Ingress - path-based routing (all paths on same host)
# For saurya-prototype branch: saurya-prototype.ohe-staging.platform-team.all-hands.dev
ingress:
  enabled: true
  host: "saurya-prototype.ohe-staging.platform-team.all-hands.dev"
  class: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
  root:
    annotations: {}
  integrations:
    annotations: {}
  mcp:
    annotations: {}

# TLS configuration 
tls:
  enabled: true
  env: staging  # Used to derive secret name: app-all-hands-staging-tls

# Environment variables
env:
  DISABLE_WAITLIST: "true"
  LOG_LEVEL: "INFO"
  SANDBOX_REMOTE_RUNTIME_API_TIMEOUT: "60"
  # Runtime URL pattern for path-based routing
  RUNTIME_URL_PATTERN: "https://saurya-prototype.ohe-staging.platform-team.all-hands.dev/runtime/{runtime_id}"

# Session JWT secret
sessions:
  existingSecret: jwt-secret

# Service account
serviceAccount:
  create: true
  name: openhands-sa

# Database migrations
databaseMigrations:
  waitForDatabase: true
  createDatabases: true
  migrate: true
  postgresImage: "public.ecr.aws/bitnami/postgresql:latest"

# Disable features not needed for testing
github:
  enabled: false
gitlab:
  enabled: false
slack:
  enabled: false
stripe:
  enabled: false
laminar:
  enabled: false

# Filestore - use ephemeral minio for testing
filestore:
  ephemeral: true
  bucket: openhands-sessions

# Minio configuration for ephemeral storage
minio:
  replicas: 1
  mode: standalone
  persistence:
    enabled: false
  buckets:
    - name: openhands-sessions
      policy: none
      purge: true
  svcaccts:
    - accessKey: "default"
      secretKey: "notasecret"
      user: root
  rootUser: "root"
  rootPassword: "minioadmin"
  resources:
    requests:
      memory: 100Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m

# -----------------------
# Keycloak for authentication - Using SHARED Keycloak
# -----------------------
# For shared Keycloak (Option 2), we disable the embedded Keycloak subchart
# and point to the shared instance at auth.ohe-staging.platform-team.all-hands.dev
keycloak:
  enabled: false  # Disable embedded Keycloak - using shared instance
  # External URL for shared Keycloak (used by browser redirects)
  # Note: No /auth suffix - Keycloak is served at root path
  url: "https://auth.ohe-staging.platform-team.all-hands.dev"
  # Internal URL is not used when keycloak.enabled=false
  # The keycloak-realm secret must be created separately with:
  #   - realm-name: allhands
  #   - client-id: <branch-specific-client-id>
  #   - client-secret: <branch-specific-client-secret>
  #   - smtp-password: <from shared keycloak>
  #
  # Create with:
  # kubectl create secret generic keycloak-realm -n <namespace> \
  #   --from-literal=realm-name=allhands \
  #   --from-literal=client-id=openhands-saurya-prototype \
  #   --from-literal=client-secret=<secret> \
  #   --from-literal=smtp-password=<smtp-password>
  externalDatabase:
    database: bitnami_keycloak  # Still needed for database creation

# -----------------------
# LiteLLM proxy - DISABLED for initial testing
# -----------------------
litellm-helm:
  enabled: false

# LiteLLM URL (point to external or enable litellm-helm)
litellm:
  url: "http://localhost:4000"  # Placeholder - will need real LLM proxy
  teamId: "openhands"

# -----------------------
# PostgreSQL
# -----------------------
postgresql:
  enabled: true
  fullnameOverride: openhands-postgresql
  auth:
    username: postgres
    database: openhands_db
    existingSecret: postgres-password
    secretKeys:
      adminPasswordKey: password
  primary:
    initdb:
      scriptsConfigMap: ""
    persistence:
      enabled: true
      size: 10Gi
  service:
    ports:
      postgresql: 5432
  # Use AWS ECR for Bitnami images (Docker Hub removed bitnami images)
  image:
    registry: public.ecr.aws
    repository: bitnami/postgresql
    tag: "latest"

# -----------------------
# Redis
# -----------------------
redis:
  enabled: true
  fullnameOverride: openhands-redis
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi
  replica:
    replicaCount: 0
  resources:
    requests:
      memory: 100Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m
  # Use AWS ECR for Bitnami images (Docker Hub removed bitnami images)
  image:
    registry: public.ecr.aws
    repository: bitnami/redis
    tag: "latest"

# -----------------------
# Runtime API configuration
# -----------------------
runtime-api:
  enabled: true
  replicaCount: 1
  runtimeInSameCluster: true
  imagePullSecrets:
    - name: ghcr-login-secret
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: Always
    runAsNonRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      memory: 1Gi
  # Warm runtimes - keep 1 ready for fast startup
  warmRuntimes:
    enabled: true
    count: 1
    configs:
      - name: default
        image: "ghcr.io/openhands/runtime:cloud-1.22.1-nikolaik"
        working_dir: "/openhands/code/"
        environment: {}
        command:
          - /openhands/micromamba/bin/micromamba
          - run
          - -n
          - openhands
          - poetry
          - run
          - python
          - -u
          - -m
          - openhands.runtime.action_execution_server
          - "60000"
          - --working-dir
          - /workspace
          - --plugins
          - agent_skills
          - jupyter
          - vscode
          - --username
          - root
          - --user-id
          - "0"
  databaseMigrations:
    waitForDatabase: true
    createDatabases: true
    migrate: true
  postgresql:
    auth:
      username: postgres
      existingSecret: postgres-password
  externalDatabase:
    enabled: false
    existingSecret: postgres-password
  # Runtime API ingress - path-based
  ingress:
    enabled: true
    host: "saurya-prototype.ohe-staging.platform-team.all-hands.dev"
    path: /runtime
    pathType: Prefix
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls: true
    tlsSecretName: app-all-hands-staging-tls
  env:
    DB_HOST: openhands-postgresql
    DB_USER: postgres
    DB_NAME: runtime_api_db
    K8S_NAMESPACE: "openhands"
    RUNTIME_CLASS: ""
    RUNTIME_BASE_URL: "saurya-prototype.ohe-staging.platform-team.all-hands.dev"
    RUNTIME_DISABLE_SSL: "false"
    MEMORY_REQUEST: "2048Mi"
    MEMORY_LIMIT: "2048Mi"
    CPU_REQUEST: "500m"
    EPHEMERAL_STORAGE_SIZE: "10Gi"

# Runtime image configuration
runtime:
  image:
    repository: ghcr.io/openhands/runtime
    tag: cloud-1.22.1-nikolaik
  runAsRoot: true

# Sandbox configuration
sandbox:
  apiHostname: "http://runtime-api-runtime-api:5000"

# -----------------------
# Automation - disabled for initial testing
# -----------------------
automation:
  enabled: false

# Replicated - disabled (not using Replicated)
replicated:
  enabled: false
