apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: infra
spec:
  chart:
    name: infra
  releaseName: infra
  namespace: cert-manager
  # Weight 5 places infra between openhands-secrets (1) and openhands (10)
  # so cert-manager and trust-manager CRDs exist before openhands installs.
  weight: 5
  helmUpgradeFlags: ["--wait", "--timeout", "600s"]
  values:
    cert-manager:
      image:
        repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/cert-manager-controller'
      webhook:
        image:
          repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/cert-manager-webhook'
      cainjector:
        image:
          repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/cert-manager-cainjector'
      acmesolver:
        image:
          repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/cert-manager-acmesolver'
      startupapicheck:
        image:
          repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/cert-manager-startupapicheck'
    trust-manager:
      image:
        repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/trust-manager'
      defaultPackageImage:
        repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/trust-manager-package-debian'

  optionalValues:
    - when: '{{repl HasLocalRegistry }}'
      recursiveMerge: true
      values:
        cert-manager:
          image:
            repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/cert-manager-controller'
          webhook:
            image:
              repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/cert-manager-webhook'
          cainjector:
            image:
              repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/cert-manager-cainjector'
          acmesolver:
            image:
              repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/cert-manager-acmesolver'
          startupapicheck:
            image:
              repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/cert-manager-startupapicheck'
        trust-manager:
          image:
            repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/trust-manager'
          defaultPackageImage:
            repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/trust-manager-package-debian'

  builder:
    cert-manager:
      enabled: true
    trust-manager:
      enabled: true
