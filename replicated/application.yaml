apiVersion: kots.io/v1beta1
kind: Application
metadata:
  name: openhands
spec:
  title: OpenHands
  icon: https://raw.githubusercontent.com/All-Hands-AI/OpenHands/main/frontend/public/apple-touch-icon.png
  releaseNotes: |
    ## OpenHands v0.47.0

    OpenHands is an AI-driven autonomous software engineer that can help you build, debug, and deploy applications.

  additionalNamespaces:
    - openhands

  statusInformers:
    # openhands
    - openhands/deployment/openhands
    - openhands/service/openhands-service
    - openhands/ingress/openhands-root-ingress
    - openhands/deployment/openhands-integrations
    - openhands/service/openhands-integrations-service
    - openhands/ingress/openhands-integrations-ingress
    - openhands/deployment/openhands-mcp
    - openhands/service/openhands-mcp-service
    - openhands/ingress/openhands-mcp-ingress

    # keycloak
    - openhands/statefulset/keycloak
    - openhands/service/keycloak

    # laminar (for analytics)
    - openhands/deployment/laminar-app-server
    - openhands/deployment/laminar-app-server-consumer
    - openhands/deployment/laminar-frontend
    - openhands/deployment/laminar-query-engine
    - openhands/deployment/laminar-quickwit-control-plane
    - openhands/deployment/laminar-quickwit-janitor
    - openhands/deployment/laminar-quickwit-metastore
    - openhands/deployment/laminar-redis
    - openhands/service/laminar-app-server-consumer-service
    - openhands/service/laminar-app-server-load-balancer
    - openhands/service/laminar-app-server-service
    - openhands/service/laminar-clickhouse-headless
    - openhands/service/laminar-clickhouse-service
    - openhands/service/laminar-frontend-service
    - openhands/service/laminar-postgres-headless
    - openhands/service/laminar-postgres-service
    - openhands/service/laminar-query-engine-service
    - openhands/service/laminar-quickwit-control-plane
    - openhands/service/laminar-quickwit-headless
    - openhands/service/laminar-quickwit-indexer
    - openhands/service/laminar-quickwit-janitor
    - openhands/service/laminar-quickwit-metastore
    - openhands/service/laminar-quickwit-searcher
    - openhands/service/laminar-rabbitmq-headless
    - openhands/service/laminar-rabbitmq-service
    - openhands/service/laminar-redis-service
    - openhands/ingress/laminar-frontend-alb

    # postgres
    - '{{repl if ConfigOptionEquals "postgres_type" "embedded_postgres"}}openhands/statefulset/openhands-postgresql{{repl end}}'
    - '{{repl if ConfigOptionEquals "postgres_type" "embedded_postgres"}}openhands/service/openhands-postgresql{{repl end}}'

    # redis
    - openhands/statefulset/openhands-redis-master
    - openhands/service/openhands-redis-master

    # lite-llm
    - openhands/deployment/openhands-litellm
    - openhands/service/openhands-litellm

    # minio
    - openhands/deployment/openhands-minio
    - openhands/service/openhands-minio

    # runtime-api chart
    - openhands/deployment/openhands-runtime-api
    - openhands/service/openhands-runtime-api
    - openhands/ingress/openhands-runtime-api-ingress
  ports:
    - serviceName: openhands
      servicePort: 3000
      localPort: 3000
      applicationUrl: "http://openhands"
