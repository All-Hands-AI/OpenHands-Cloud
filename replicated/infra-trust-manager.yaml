apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: infra-trust-manager
spec:
  chart:
    name: infra
  releaseName: infra-trust-manager
  namespace: cert-manager
  # Weight 6 runs after cert-manager (weight 5) so its CRDs (Certificate, Issuer)
  # already exist when helm builds trust-manager's manifests.
  weight: 6
  helmUpgradeFlags: ["--wait", "--timeout", "600s"]
  values:
    cert-manager:
      enabled: false
    trust-manager:
      enabled: true
      imagePullSecrets:
        - name: '{{repl ImagePullSecretName }}'
      image:
        repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/trust-manager'
      defaultPackageImage:
        repository: 'images.r9.all-hands.dev/proxy/{{repl LicenseFieldValue "appSlug"}}/quay.io/jetstack/trust-pkg-debian-bookworm'

  optionalValues:
    - when: '{{repl HasLocalRegistry }}'
      recursiveMerge: true
      values:
        trust-manager:
          image:
            repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/trust-manager'
          defaultPackageImage:
            repository: '{{repl LocalRegistryHost }}/{{repl LocalRegistryNamespace }}/trust-pkg-debian-bookworm'

  builder:
    cert-manager:
      enabled: false
    trust-manager:
      enabled: true
