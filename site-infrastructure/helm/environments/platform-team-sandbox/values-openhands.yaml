# =============================================================================
# OpenHands Site-Specific Values: platform-team-sandbox
# =============================================================================
# Runtime Isolation Status: DISABLED (no gVisor or sysbox)
#
# CURRENT STATE:
# - Runtime pods run WITHOUT special isolation (standard containerd)
# - This is a temporary configuration until infrastructure enables gVisor
#
# TO ENABLE GVISOR LATER:
# 1. In site-infrastructure/terraform: set enable_gke_sandbox = true for runtime node pool
# 2. Apply terraform to recreate nodes with gVisor support
# 3. In this file: uncomment RUNTIME_CLASS: "gvisor" lines
# 4. Verify: kubectl get runtimeclass gvisor && kubectl get nodes -l sandbox.gke.io/runtime=gvisor
#
# Usage:
#   helm install openhands ./charts/openhands \
#     -f site-infrastructure/helm/environments/platform-team-sandbox/values-openhands.yaml \
#     --set branchSanitized=my-branch
# =============================================================================

# Image override - use sha-115237f which has migrations up to 112
image:
  tag: sha-115237f

# Site-specific hostnames with subdomain routing
ingress:
  enabled: true
  host: "ohe-staging.platform-team.all-hands.dev"
  prefixWithBranch: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01

env:
  RUNTIME_URL_PATTERN: "https://ohe-staging.platform-team.all-hands.dev/runtime/{runtime_id}"

# Runtime API endpoint for OpenHands server to communicate with runtime-api
sandbox:
  apiHostname: "http://openhands-runtime-api:5000"

# Use shared Keycloak
keycloak:
  url: "https://auth.ohe-staging.platform-team.all-hands.dev"
  authHost: "auth.ohe-staging.platform-team.all-hands.dev"

enterpriseSSO:
  enabled: true

# LiteLLM using shared PostgreSQL
litellm-helm:
  enabled: true
  db:
    useExisting: true
    deployStandalone: false
    endpoint: openhands-postgresql
  ingress:
    enabled: false

litellm:
  url: "http://litellm-helm:4000"

# Ephemeral minio storage for testing (production would use GCS/S3)
filestore:
  ephemeral: true

# Enable database creation
databaseMigrations:
  createDatabases: true

# PostgreSQL with persistence
postgresql:
  fullnameOverride: openhands-postgresql
  auth:
    database: openhands_db
  primary:
    persistence:
      enabled: true
      size: 10Gi

# Redis
redis:
  fullnameOverride: openhands-redis
  auth:
    enabled: true
    existingSecret: "redis"

# =============================================================================
# RUNTIME CONFIGURATION
# =============================================================================
# Runtime isolation: DISABLED
# - RUNTIME_CLASS is set to empty string (no gVisor/sysbox)
# - Runtime pods run with standard containerd
# - Pods schedule on nodes with openhands.ai/node-type=runtime label
#
# TO ENABLE GVISOR LATER (requires infrastructure changes first):
# 1. Uncomment RUNTIME_CLASS: "gvisor" below
# 2. Remove the explicit RUNTIME_NODE_SELECTOR and RUNTIME_TOLERATIONS
#    (gVisor RuntimeClass has built-in scheduling constraints)
# =============================================================================

runtime-api:
  fullnameOverride: openhands-runtime-api
  imagePullSecrets:
    - name: ghcr-login-secret
  databaseMigrations:
    createDatabases: true
  postgresql:
    auth:
      existingSecret: postgres-password
  ingress:
    enabled: true
    host: "ohe-staging.platform-team.all-hands.dev"
    prefixWithBranch: true
    path: /runtime
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns01
  env:
    # Database connection
    DB_HOST: openhands-postgresql
    DB_USER: postgres
    DB_NAME: runtime_api_db
    # Kubernetes namespace for runtime pods
    K8S_NAMESPACE: "openhands"
    # Runtime base URL
    RUNTIME_BASE_URL: "ohe-staging.platform-team.all-hands.dev"
    # ============================================================
    # RUNTIME ISOLATION: DISABLED
    # Empty string = no RuntimeClass = standard containerd
    # To enable gVisor: uncomment below and ensure infra has gVisor nodes
    # ============================================================
    RUNTIME_CLASS: ""
    # RUNTIME_CLASS: "gvisor"  # Uncomment when infra enables gVisor
    # Runtime node scheduling - schedule on runtime nodes
    RUNTIME_NODE_SELECTOR: '{"openhands.ai/node-type": "runtime"}'
    RUNTIME_TOLERATIONS: '[{"key": "openhands.ai/runtime", "operator": "Equal", "value": "true", "effect": "NoSchedule"}]'

  # Warm runtimes pre-create runtime pods for faster conversation startup
  warmRuntimes:
    enabled: true
    count: 1
    configs:
      - name: default
        image: "ghcr.io/openhands/runtime:cloud-1.22.1-nikolaik"
        working_dir: "/openhands/code/"
        environment:
          LOG_JSON: "1"
          LOG_JSON_LEVEL_KEY: "severity"
        command:
          - /openhands/micromamba/bin/micromamba
          - run
          - -n
          - openhands
          - poetry
          - run
          - python
          - -u
          - -m
          - openhands.runtime.action_execution_server
          - "60000"
          - --working-dir
          - /workspace
          - --plugins
          - agent_skills
          - jupyter
          - vscode
          - --username
          - root
          - --user-id
          - "0"
        # Node selector to schedule on runtime nodes
        nodeSelector:
          openhands.ai/node-type: "runtime"
        # Tolerations to allow scheduling on tainted runtime nodes
        tolerations:
          - key: "openhands.ai/runtime"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
