# =============================================================================
# Image Loader Site-Specific Values: single-cluster-path
# =============================================================================
# This file contains ONLY overrides from charts/image-loader/values.yaml
# 
# Usage:
#   helm install image-loader ./charts/image-loader \
#     -f site-infrastructure/helm/environments/single-cluster-path/values-image-loader.yaml
# =============================================================================

# Image: Inherits from base chart (ghcr.io/openhands/agent-server)
# No override needed - base chart has the correct image

# Node selector for GKE Sandbox nodes (overrides sysbox-install label)
# GKE Sandbox nodes have this label set by GKE when enable_gke_sandbox=true
nodeSelector:
  sandbox.gke.io/runtime: "gvisor"

# Tolerations for GKE Sandbox nodes (overrides sysbox tolerations)
# GKE Sandbox nodes have this taint to prevent non-sandboxed workloads
tolerations:
- key: "sandbox.gke.io/runtime"
  operator: "Equal"
  value: "gvisor"
  effect: "NoSchedule"
