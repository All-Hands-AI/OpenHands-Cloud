# =============================================================================
# Image Loader Site-Specific Values: single-cluster-subdomain
# =============================================================================
# This file contains ONLY overrides from charts/image-loader/values.yaml
# 
# Usage:
#   helm install image-loader ./charts/image-loader \
#     -f site-infrastructure/helm/environments/single-cluster-subdomain/values-image-loader.yaml
