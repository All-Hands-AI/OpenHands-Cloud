# =============================================================================
# OpenHands Site-Specific Values: single-cluster-subdomain
# =============================================================================
# This file contains ONLY overrides from charts/openhands/values.yaml
# 
# Usage:
#   helm install openhands ./charts/openhands \
#     -f site-infrastructure/helm/environments/single-cluster-subdomain/values-openhands.yaml \
#     --set branchSanitized=my-branch
# =============================================================================

# Image override - using PR #14243 fix for SAML IdP token handling
# PR: https://github.com/All-Hands-AI/OpenHands/pull/14243
# TODO: Remove this override once PR is merged and included in a release
image:
  tag: sha-f50653f

# Site-specific hostnames with subdomain routing
ingress:
  enabled: true
  host: "ohe-staging.platform-team.all-hands.dev"
  prefixWithBranch: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01

env:
  RUNTIME_URL_PATTERN: "https://ohe-staging.platform-team.all-hands.dev/runtime/{runtime_id}"

# Use shared Keycloak (keycloak.enabled=false is already default)
keycloak:
  url: "https://auth.ohe-staging.platform-team.all-hands.dev"

enterpriseSSO:
  enabled: true

# LiteLLM using shared PostgreSQL
litellm-helm:
  enabled: true
  db:
    useExisting: true
    deployStandalone: false
    endpoint: openhands-postgresql
  ingress:
    enabled: false

litellm:
  url: "http://litellm-helm:4000"

# Ephemeral minio storage for testing (production would use GCS/S3)
filestore:
  ephemeral: true

# Enable database creation (chart default is false)
databaseMigrations:
  createDatabases: true

# PostgreSQL with persistence (chart default has persistence disabled)
postgresql:
  fullnameOverride: openhands-postgresql
  auth:
    database: openhands_db
  primary:
    persistence:
      enabled: true
      size: 10Gi

# Redis (persistence disabled by default, which is fine for staging)
redis:
  fullnameOverride: openhands-redis
  auth:
    enabled: true
    existingSecret: "redis"

# Runtime API site-specific config
runtime-api:
  imagePullSecrets:
    - name: ghcr-login-secret
  databaseMigrations:
    createDatabases: true
  ingress:
    enabled: true
    host: "ohe-staging.platform-team.all-hands.dev"
    prefixWithBranch: true
    path: /runtime
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns01
  env:
    # Override DB_HOST to point to our postgresql instance
    DB_HOST: openhands-postgresql
    RUNTIME_BASE_URL: "ohe-staging.platform-team.all-hands.dev"
    # Use gVisor runtime class (GKE Sandbox) - matches enable_gke_sandbox=true in Terraform
    RUNTIME_CLASS: "gvisor"
  # Warm runtimes with gVisor tolerations for GKE Sandbox nodes
  warmRuntimes:
    enabled: true
    count: 1
    configs:
      - name: default
        image: "ghcr.io/openhands/runtime:cloud-1.22.1-nikolaik"
        working_dir: "/openhands/code/"
        environment: {}
        # Tolerations for scheduling on GKE Sandbox (gVisor) nodes
        tolerations:
          - key: "sandbox.gke.io/runtime"
            operator: "Equal"
            value: "gvisor"
            effect: "NoSchedule"
        command:
          - /openhands/micromamba/bin/micromamba
          - run
          - -n
          - openhands
          - poetry
          - run
          - python
          - -u
          - -m
          - openhands.runtime.action_execution_server
          - "60000"
          - --working-dir
          - /workspace
          - --plugins
          - agent_skills
          - jupyter
          - vscode
          - --username
          - root
          - --user-id
          - "0"
