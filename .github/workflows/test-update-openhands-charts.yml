name: Test update_openhands_charts

on:
  pull_request:
    paths:
      - 'scripts/update_openhands_charts/**'
      - '.github/workflows/test-update-openhands-charts.yml'

jobs:
  test-update-openhands-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run update_openhands_charts tests
        run: uv run scripts/update_openhands_charts/test_update_openhands_charts.py
