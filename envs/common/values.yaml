# Common staging environment values for OpenHands
# Environment-specific values (host, URLs) are in envs/staging-*/values.yaml

imagePullSecrets:
  - name: ghcr-login-secret

databaseMigrations:
  waitForDatabase: false

ingress:
  enabled: true
  class: traefik
  root:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
  integrations:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
  mcp:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt

helm-release-pruner:
  enabled: true
  job:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 100m
        memory: 256Mi

sandbox:
  apiHostname: https://runtime.staging.all-hands.dev

runtime-api:
  enabled: false

filestore:
  type: google_cloud
  bucket: staging-openhands-sessions

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: openhands-sa@staging-092324.iam.gserviceaccount.com

migrationJob:
  enabled: true
  initContainer:
    enabled: false

github:
  enabled: true

env:
  ENABLE_BILLING: "true"
  OH_APP_MODE: "saas"
  OH_WEB_CLIENT_FEATURE_FLAGS_ENABLE_BILLING: "true"
  OH_WEB_CLIENT_FEATURE_FLAGS_ENABLE_JIRA: "true"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_USERS_PAGE: "false"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_BILLING_PAGE: "false"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_INTEGRATIONS_PAGE: "false"
  OH_WEB_CLIENT_PROVIDERS_CONFIGURED: '["github","gitlab","bitbucket"]'
  OH_WEB_CLIENT_GITHUB_APP_SLUG: "openhands-staging"
  OH_APP_CONVERSATION_INFO_KIND: "server.utils.saas_app_conversation_info_injector.SaasAppConversationInfoServiceInjector"
  HIDE_LLM_SETTINGS: "false"
  GOOGLE_CLOUD_PROJECT: staging-092324
  GCP_PROJECT: staging-092324
  RECAPTCHA_PROJECT_ID: staging-092324
  RECAPTCHA_SITE_KEY: ""
  RECAPTCHA_HMAC_SECRET: "qgfN+prMC1iMziHP3YndNicZjgK5IMXITUuVQOnEe9o="
  RECAPTCHA_BLOCK_THRESHOLD: "0.3"
  GCP_REGION: us-central1
  GCP_DB_INSTANCE: application-db
  DB_USER: openhands-user
  DB_NAME: openhands
  MAX_CONCURRENT_CONVERSATIONS: "10"
  DB_POOL_SIZE: "25"
  DB_MAX_OVERFLOW: "30"
  ENABLE_PROACTIVE_CONVERSATION_STARTERS: "false"
  ENABLE_SOLVABILITY_ANALYSIS: "true"
  ENABLE_MCP_SEARCH_ENGINE: "true"
  ENABLE_EXPERIMENT_MANAGER: "true"
  EXPERIMENT_SYSTEM_PROMPT_EXPERIMENT: "three_system_prompt_experiment"
  EXPERIMENT_CONDENSER_MAX_STEP: "condenser_max_step_experiment"
  CONVERSATION_MANAGER_CLASS: "server.saas_nested_conversation_manager.SaasNestedConversationManager"
  INIT_GIT_IN_EMPTY_WORKSPACE: "1"
  RUNTIME_URL_PATTERN: "https://{runtime_id}.staging-runtime.all-hands.dev"
  OPENHANDS_PROVIDER_BASE_URL: "https://llm-proxy.staging.all-hands.dev/"
  JIRA_WEBHOOKS_ENABLED: "true"
  EMAIL_PATTERN_BLACKLIST: "%"
  EMAIL_PATTERN_WHITELIST: "%@openhands.dev,%@all-hands.dev"
  OH_USER_AUTHORIZER_PREVENT_DUPLICATES: "false"
  V1_ENABLED: "true"
  ENABLE_V1_SLACK_RESOLVER: "true"
  ENABLE_V1_GITHUB_RESOLVER: "true"
  DUPLICATE_EMAIL_CHECK: "false"
  OPENHANDS_SUPPRESS_BANNER: "1"

litellm:
  enabled: true
  url: https://llm-proxy.staging.all-hands.dev
  teamId: 62ea39c4-8886-44f3-b7ce-07ed4fe42d2c
  auth:
    existingSecret: lite-llm-api-key
  envVars:
    JSON_LOGS: "true"

keycloak:
  enabled: false
  url: "http://keycloak.keycloak"

laminar:
  enabled: true
  global:
    cloudProvider: "gcp"
  clickhouse:
    s3:
      enabled: false
  appServer:
    ingress:
      hostname: "laminar-api.staging.all-hands.dev"
  frontend:
    extraEnv:
      - name: AUTH_KEYCLOAK_ID
        valueFrom:
          secretKeyRef:
            name: keycloak-realm
            key: client-id
      - name: AUTH_KEYCLOAK_SECRET
        valueFrom:
          secretKeyRef:
            name: keycloak-realm
            key: client-secret
      - name: AUTH_KEYCLOAK_ISSUER
        value: "https://auth.staging.all-hands.dev/realms/allhands"
    ingress:
      hostname: "laminar.staging.all-hands.dev"
    env:
      nextauthUrl: "https://laminar.staging.all-hands.dev"
      nextPublicUrl: "https://laminar.staging.all-hands.dev"
  storage:
    storageClass:
      type: "hyperdisk-balanced"

stripe:
  enabled: true
  auth:
    existingSecret: stripe-api-key

resend:
  enabled: true
  auth:
    existingSecret: resend-api-key

gitlabWebhookInstallation:
  enabled: true
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "200m"

bitbucket:
  enabled: true
  auth:
    existingSecret: bitbucket-app

jira:
  enabled: true

enrichUserInteractionData:
  enabled: true

githubProxy:
  endpointsEnabled: true

gitlab:
  enabled: true

integrationEvents:
  deployment:
    replicas: 2
    resources:
      requests:
        memory: 2.5Gi
        cpu: 1000m
      limits:
        memory: 2.5Gi
        cpu: 1000m
  uvicorn:
    workers: 2

proactiveConvoClean:
  enabled: true
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 3
  backoffLimit: 3
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "100m"

slack:
  enabled: true
  clientId: "7477886716822.8865243365329"

debuggingRoutes:
  enabled: true

deployment:
  replicas: 2
  resources:
    requests:
      memory: 5Gi
      cpu: 1000m
    limits:
      memory: 5Gi
      cpu: 1000m

commonRoomSync:
  enabled: true
  schedule: "0 * * * *"

datadog:
  enabled: true
  env: "staging"
  service: "deploy"
  agentHost: "datadog-agent.all-hands-system.svc.cluster.local"

appConfig:
  POSTHOG_CLIENT_KEY: "phc_Wj1DvqGQgl5ml0bkZvPr55sxIvJWjlGmoHYZrxdh5qD"
  POSTHOG_HOST: "https://us.i.posthog.com"

tavily:
  enabled: true

postgresql:
  enabled: false

redis:
  master:
    resources:
      requests:
        memory: 1Gi
        cpu: 500m
      limits:
        memory: 1Gi
        cpu: 500m

gcpMonitoring:
  enabled: true

automationServiceKey:
  enabled: true
  existingSecret: automation-service-key
  secretKey: automation-service-key

automation:
  enabled: true
  image:
    repository: ghcr.io/openhands/automation
  imagePullSecrets:
    - name: ghcr-login-secret
  deployment:
    replicas: 3
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m
  serviceAccount:
    name: automation-sa
    annotations:
      iam.gke.io/gcp-service-account: automation-sa@staging-092324.iam.gserviceaccount.com
  postgresql:
    enabled: false
  database:
    host: ""
    port: "5432"
    user: "automation_user"
    name: "automations"
    createDatabaseUser: false
    secretName: "automation-db-secret"
    secretKey: "db-password"
  gcp:
    dbInstance: "application-db"
    project: "staging-092324"
    region: "us-central1"
  filestore:
    ephemeral: false
    bucket: "staging-openhands-sessions"
    type: gcs
  minio:
    enabled: false
  serviceKeyFromSecret:
    name: automation-service-key
    key: automation-service-key
  datadog:
    env: "staging"
  env:
    AUTOMATION_SCHEDULER_INTERVAL_SECONDS: "30"
    AUTOMATION_LOG_LEVEL: "info"
    GCS_BUCKET_NAME: "staging-openhands-sessions"

runtime:
  runAsRoot: true
