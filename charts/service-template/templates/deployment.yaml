apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-template
  labels:
    app: service-template
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: service-template
  template:
    metadata:
      labels:
        app: service-template
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      {{- if .Values.database.createDatabaseUser }}
      {{- if .Values.gcp.dbInstance }}
      # Start Cloud SQL Auth Proxy for database creation
      # This runs as a background process and is terminated after database creation
      - name: create-db-user
        image: postgres:14
        securityContext:
          runAsUser: 0
        env:
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.superuserSecretName }}
                key: {{ .Values.database.superuserSecretKey }}
          - name: DB_HOST
            value: "127.0.0.1"
          - name: DB_PORT
            value: {{ .Values.database.port | quote }}
          - name: DB_NAME
            value: {{ .Values.database.name | quote }}
          - name: DB_USER
            value: {{ .Values.database.user | quote }}
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.secretName }}
                key: {{ .Values.database.secretKey }}
          - name: GCP_PROJECT
            value: {{ .Values.gcp.project | quote }}
          - name: GCP_REGION
            value: {{ .Values.gcp.region | quote }}
          - name: GCP_DB_INSTANCE
            value: {{ .Values.gcp.dbInstance | quote }}
        command:
          - sh
          - -c
          - |
            # Install curl (not included in postgres:14 image)
            apt-get update && apt-get install -y --no-install-recommends curl ca-certificates > /dev/null 2>&1

            # Download and start Cloud SQL Auth Proxy
            echo "Downloading Cloud SQL Auth Proxy..."
            curl -sL -o /tmp/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
            chmod +x /tmp/cloud-sql-proxy

            echo "Starting Cloud SQL Auth Proxy..."
            /tmp/cloud-sql-proxy --port $DB_PORT "${GCP_PROJECT}:${GCP_REGION}:${GCP_DB_INSTANCE}" &
            PROXY_PID=$!

            echo "Waiting for Cloud SQL Auth Proxy to be ready..."
            for i in $(seq 1 60); do
              if psql -h $DB_HOST -p $DB_PORT -U postgres -d postgres -c "SELECT 1;" > /dev/null 2>&1; then
                echo "PostgreSQL is up via Cloud SQL Auth Proxy!"

                echo "Creating the database $DB_NAME if it doesn't exist..."
                psql -h $DB_HOST -p $DB_PORT -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 || \
                psql -h $DB_HOST -p $DB_PORT -U postgres -d postgres -c "CREATE DATABASE $DB_NAME;"

                echo "Creating the user $DB_USER if it doesn't exist..."
                psql -h $DB_HOST -p $DB_PORT -U postgres -d $DB_NAME -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 || \
                (psql -h $DB_HOST -p $DB_PORT -U postgres -d $DB_NAME -c "CREATE USER $DB_USER WITH PASSWORD '$DB_PASSWORD'; GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_USER; GRANT USAGE ON SCHEMA public TO $DB_USER; GRANT CREATE ON SCHEMA public TO $DB_USER; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO $DB_USER;")

                echo "Database and user creation complete. Stopping Cloud SQL Auth Proxy..."
                kill $PROXY_PID 2>/dev/null || true
                exit 0
              fi
              echo "Waiting for Cloud SQL Auth Proxy... ($i/60)"
              sleep 5
            done
            echo "Cloud SQL Auth Proxy did not become available in time."
            kill $PROXY_PID 2>/dev/null || true
            exit 1
      {{- else }}
      # Create service database and user in an existing PostgreSQL instance (non-GCP)
      - name: create-db-user
        image: postgres:14
        env:
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.superuserSecretName }}
                key: {{ .Values.database.superuserSecretKey }}
          - name: DB_HOST
            value: {{ .Values.database.host | quote }}
          - name: DB_PORT
            value: {{ .Values.database.port | quote }}
          - name: DB_NAME
            value: {{ .Values.database.name | quote }}
          - name: DB_USER
            value: {{ .Values.database.user | quote }}
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.secretName }}
                key: {{ .Values.database.secretKey }}
        command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL at $DB_HOST to be available..."
            for i in $(seq 1 60); do
              if psql -h $DB_HOST -p $DB_PORT -U postgres -d postgres -c "SELECT 1;" > /dev/null 2>&1; then
                echo "PostgreSQL is up!"

                echo "Creating the database $DB_NAME if it doesn't exist..."
                psql -h $DB_HOST -p $DB_PORT -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 || \
                psql -h $DB_HOST -p $DB_PORT -U postgres -d postgres -c "CREATE DATABASE $DB_NAME;"

                echo "Creating the user $DB_USER if it doesn't exist..."
                psql -h $DB_HOST -p $DB_PORT -U postgres -d $DB_NAME -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 || \
                (psql -h $DB_HOST -p $DB_PORT -U postgres -d $DB_NAME -c "CREATE USER $DB_USER WITH PASSWORD '$DB_PASSWORD'; GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_USER; GRANT USAGE ON SCHEMA public TO $DB_USER; GRANT CREATE ON SCHEMA public TO $DB_USER; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO $DB_USER;")

                exit 0
              fi
              echo "Waiting for PostgreSQL... ($i/60)"
              sleep 5
            done
            echo "PostgreSQL did not become available in time."
            exit 1
      {{- end }}
      {{- else if .Values.postgresql.enabled }}
      # Wait for the service's own PostgreSQL subchart to be ready
      - name: wait-for-postgres
        image: bitnamilegacy/postgresql:latest
        command: ['sh', '-c']
        args:
          - |
            DB_HOST="{{ .Values.database.host }}"
            echo "Waiting for PostgreSQL at $DB_HOST to be ready..."
            until PGPASSWORD=$SERVICE_DB_PASS psql -h $DB_HOST -p {{ .Values.database.port }} -U {{ .Values.database.user }} -c '\q' > /dev/null 2>&1; do
              echo "PostgreSQL is unavailable - sleeping for 2 seconds"
              sleep 2
            done
            echo "PostgreSQL is up and running!"
        env:
        {{- include "service-template.env" . | nindent 8 }}
      {{- end }}
      - name: migrate
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
        command: ["alembic", "upgrade", "head"]
        env:
        {{- include "service-template.env" . | nindent 8 }}
      containers:
      - name: service-template
        imagePullPolicy: Always
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
        {{- if .Values.datadog.enabled }}
        command: ["ddtrace-run"]
        args:
          - "uvicorn"
          - "service.app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
        {{- else }}
        args:
          - "uvicorn"
          - "service.app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
        {{- end }}
        ports:
        - containerPort: 8000
        resources:
          {{- toYaml .Values.deployment.resources | nindent 12 }}
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
        env:
        {{- include "service-template.env" . | nindent 8 }}
