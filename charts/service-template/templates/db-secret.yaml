{{/*
  Generate a database password secret if:
  - database.createDatabaseUser is true (we're managing the DB user)
  - database.existingSecret is false (no pre-existing secret specified)
  
  If a secret with this name already exists (from a previous release or manual creation),
  we preserve its password value but take over Helm management of the resource.
*/}}
{{- if and .Values.database.createDatabaseUser (not .Values.database.existingSecret) }}
{{- $secretName := .Values.database.secretName | default "service-template-db-secret" }}
{{- $secretKey := .Values.database.secretKey | default "db-password" }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app: service-template
    app.kubernetes.io/name: service-template
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    "helm.sh/resource-policy": keep
type: Opaque
{{- if and $existingSecret (index $existingSecret.data $secretKey) }}
data:
  {{ $secretKey }}: {{ index $existingSecret.data $secretKey }}
{{- else }}
stringData:
  {{ $secretKey }}: {{ randAlphaNum 32 | quote }}
{{- end }}
{{- end }}
