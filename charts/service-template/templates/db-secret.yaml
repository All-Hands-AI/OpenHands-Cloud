{{- if and .Values.database.createDatabaseUser (not .Values.database.existingSecret) }}
{{- $secretName := .Values.database.secretName | default "service-template-db-secret" }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app: service-template
  {{- if not $existingSecret }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
type: Opaque
{{- if $existingSecret }}
data:
  {{ .Values.database.secretKey | default "db-password" }}: {{ index $existingSecret.data (.Values.database.secretKey | default "db-password") }}
{{- else }}
stringData:
  {{ .Values.database.secretKey | default "db-password" }}: {{ randAlphaNum 32 | quote }}
{{- end }}
{{- end }}
