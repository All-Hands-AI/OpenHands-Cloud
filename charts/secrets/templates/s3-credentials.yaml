{{- if or .Values.config.external_s3_access_key .Values.config.external_s3_secret_key }}
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- if .Values.config.external_s3_access_key }}
  access-key: {{ .Values.config.external_s3_access_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.external_s3_secret_key }}
  secret-key: {{ .Values.config.external_s3_secret_key | b64enc | quote }}
  {{- end }}
{{- end }}