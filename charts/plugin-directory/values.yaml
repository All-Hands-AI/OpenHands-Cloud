# Plugin Directory Helm Chart Values
# This chart deploys the Plugin Directory marketplace using a sidecar pattern
# (client + server containers in the same pod)

# Client container configuration (React Router SSR)
client:
  image:
    repository: ghcr.io/openhands/plugin-directory-client
    tag: "sha-616b211"
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

# Server container configuration (FastAPI backend)
server:
  image:
    repository: ghcr.io/openhands/plugin-directory-server
    tag: "sha-616b211"
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

# Deployment configuration
deployment:
  replicas: 1

# Security context for the pod
securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true

# Service account configuration
serviceAccount:
  create: true
  name: plugin-directory-sa
  annotations: {}

# Image pull secrets (inherited from parent chart when deployed as subchart)
imagePullSecrets: []

# Probe configuration
probes:
  startup:
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# Application environment variables
appEnv:
  MARKETPLACE_SOURCE: ""
  FEATURED_PLUGIN_IDS: ""
  LOG_LEVEL: "INFO"

# URL configuration
# App URL for the client (e.g., https://plugins.example.com or https://example.com/plugins)
appUrl: ""

# URL path where the app is served (e.g., /plugins). Used as the FastAPI
# router prefix at runtime, and used to derive the client health-probe paths.
# Client-side Vite base / React Router basename are baked at image build time
# via the PLUGIN_DIRECTORY_BASE_PATH docker build arg — this runtime value
# must match what the image was built with. The upstream image defaults to
# /plugins; set this to "" only when using an image built without a base path.
pluginDirectoryBasePath: "/plugins"

# PostgreSQL database configuration
database:
  # Full hostname of the PostgreSQL server
  host: ""
  port: "5432"
  user: "postgres"
  name: "plugindir"
  # Secret containing the database password
  secretName: "postgres-password"
  secretKey: "password"
  # Create database in an existing PostgreSQL instance
  # When true, runs an init container to create the database on startup
  createDatabase: false
  # Secret containing the postgres superuser password (for creating the database)
  # Only used when createDatabase=true
  superuserSecretName: "postgres-password"
  superuserSecretKey: "password"

# Authentication configuration
auth:
  # Secret containing authentication credentials
  existingSecret: plugin-directory-secrets
  # Keys in the secret
  identitySharedSecretKey: identity-shared-secret
  sessionSecretKey: session-secret
  oidcClientSecretKey: oidc-client-secret

# Keycloak/OIDC configuration
oidc:
  # Keycloak server URL (e.g., https://auth.example.com)
  issuerUrl: ""
  clientId: "plugin-directory"
  # Realm name secret reference
  realmSecretName: "keycloak-realm"
  realmSecretKey: "realm-name"

# Datadog configuration
datadog:
  enabled: false
  env: "dev"

# Env vars passed directly to the containers (overrides defaults)
env: {}
