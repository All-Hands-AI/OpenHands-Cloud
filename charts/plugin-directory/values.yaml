# Plugin Directory Helm Chart Values
# This chart deploys the Plugin Directory marketplace using a sidecar pattern
# (client + server containers in the same pod)

# Database init container toggles (same pattern as runtime-api chart).
# createDatabases issues CREATE DATABASE as the configured DB_USER, so the
# user must have CREATEDB (or already be postgres). No separate superuser
# secret is needed.
databaseMigrations:
  waitForDatabase: true
  createDatabases: false
  migrate: true

# Client container configuration (React Router SSR)
client:
  image:
    repository: ghcr.io/openhands/plugin-directory-client
    tag: "sha-a0fd8eb"
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

# Server container configuration (FastAPI backend)
server:
  image:
    repository: ghcr.io/openhands/plugin-directory-server
    tag: "sha-a0fd8eb"
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

# Deployment configuration
deployment:
  replicas: 1

# Security context for the pod
securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true

# Service account configuration
serviceAccount:
  create: true
  name: plugin-directory-sa
  annotations: {}

# Image pull secrets (inherited from parent chart when deployed as subchart)
imagePullSecrets: []

# Probe configuration
probes:
  startup:
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# Application environment variables
appEnv:
  MARKETPLACE_SOURCE: ""
  FEATURED_PLUGIN_IDS: ""
  LOG_LEVEL: "INFO"

# URL configuration
# App URL for the client (e.g., https://plugins.example.com or https://example.com/plugins)
appUrl: ""

# PostgreSQL database configuration
database:
  # Full hostname of the PostgreSQL server
  host: ""
  port: "5432"
  user: "postgres"
  name: "plugindir"
  # Secret containing the database password
  secretName: "postgres-password"
  secretKey: "password"

# Authentication configuration
auth:
  # Secret containing plugin-directory-specific auth credentials
  # (internal identity + session signing keys).
  existingSecret: plugin-directory-secrets
  identitySharedSecretKey: identity-shared-secret
  sessionSecretKey: session-secret

# Keycloak/OIDC configuration
# Reuses the existing allhands Keycloak client (same one the main
# openhands app uses) via the shared keycloak-realm secret. No dedicated
# plugin-directory client is registered. Matches the laminar pattern.
oidc:
  # Keycloak server URL (e.g., https://auth.example.com)
  issuerUrl: ""
  # Shared keycloak-realm secret: provides realm name + allhands client
  # credentials (client-id, client-secret).
  realmSecretName: "keycloak-realm"
  realmSecretKey: "realm-name"
  clientIdKey: "client-id"
  clientSecretKey: "client-secret"

# Datadog configuration
datadog:
  enabled: false
  env: "dev"

# Env vars passed directly to the containers (overrides defaults)
env: {}
