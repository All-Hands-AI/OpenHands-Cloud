apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin-directory
  labels:
    app: plugin-directory
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: plugin-directory
  template:
    metadata:
      labels:
        app: plugin-directory
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      # Wait for PostgreSQL to be ready
      - name: wait-for-db
        image: "bitnamilegacy/postgresql:latest"
        command: ['sh', '-c']
        args:
          - |
            echo "Waiting for PostgreSQL at $DB_HOST to be ready..."
            until PGPASSWORD=$DB_PASS pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME > /dev/null 2>&1; do
              echo "PostgreSQL is unavailable - sleeping for 2 seconds"
              sleep 2
            done
            echo "PostgreSQL is up and running!"
        env:
          - name: DB_HOST
            value: {{ .Values.database.host | quote }}
          - name: DB_PORT
            value: {{ .Values.database.port | quote }}
          - name: DB_USER
            value: {{ .Values.database.user | quote }}
          - name: DB_NAME
            value: {{ .Values.database.name | quote }}
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.secretName }}
                key: {{ .Values.database.secretKey }}
      {{- if .Values.database.createDatabase }}
      # Create database if it doesn't exist
      - name: create-db
        image: "bitnamilegacy/postgresql:latest"
        command: ['sh', '-c']
        args:
          - |
            export PGPASSWORD=$SUPERUSER_PASS
            PSQL="psql -h $DB_HOST -p $DB_PORT -U postgres"

            echo "Ensuring database \"$DB_NAME\" exists..."
            $PSQL -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 || \
            $PSQL -d postgres -c "CREATE DATABASE $DB_NAME;"

            echo "Database ready."
        env:
          - name: DB_HOST
            value: {{ .Values.database.host | quote }}
          - name: DB_PORT
            value: {{ .Values.database.port | quote }}
          - name: DB_NAME
            value: {{ .Values.database.name | quote }}
          - name: SUPERUSER_PASS
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.superuserSecretName }}
                key: {{ .Values.database.superuserSecretKey }}
      {{- end }}
      # Run database migrations
      - name: migrate-db
        image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
        command: ["alembic", "upgrade", "head"]
        env:
        {{- include "plugin-directory.env.server" . | nindent 8 }}
      containers:
      # Server container (FastAPI backend)
      - name: server
        image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
        imagePullPolicy: Always
        ports:
          - name: api
            containerPort: 8000
            protocol: TCP
        env:
        {{- include "plugin-directory.env.server" . | nindent 8 }}
        resources:
          {{- toYaml .Values.server.resources | nindent 10 }}
        startupProbe:
          httpGet:
            path: /health/live
            port: 8000
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

      # Client container (React Router SSR)
      {{- $clientBasePath := "" }}
      {{- if .Values.pluginDirectoryBaseUrl }}
      {{- $clientBasePath = trimSuffix "/" (get (urlParse .Values.pluginDirectoryBaseUrl) "path") }}
      {{- end }}
      - name: client
        image: "{{ .Values.client.image.repository }}:{{ .Values.client.image.tag }}"
        imagePullPolicy: Always
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        env:
        {{- include "plugin-directory.env.client" . | nindent 8 }}
        resources:
          {{- toYaml .Values.client.resources | nindent 10 }}
        startupProbe:
          httpGet:
            path: {{ $clientBasePath }}/health/live
            port: 3000
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
        livenessProbe:
          httpGet:
            path: {{ $clientBasePath }}/health/live
            port: 3000
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ $clientBasePath }}/health/ready
            port: 3000
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
