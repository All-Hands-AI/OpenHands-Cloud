{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bitbucket-oauth-proxy.fullname" . }}
  labels:
    {{- include "bitbucket-oauth-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "bitbucket-oauth-proxy.selectorLabels" . | nindent 4 }}
{{- end }}
