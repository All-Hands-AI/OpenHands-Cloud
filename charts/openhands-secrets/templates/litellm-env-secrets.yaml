apiVersion: v1
kind: Secret
metadata:
  name: litellm-env-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- if .Values.config.anthropic_api_key }}
  ANTHROPIC_API_KEY: {{ .Values.config.anthropic_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.openai_api_key }}
  OPENAI_API_KEY: {{ .Values.config.openai_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.google_gemini_api_key }}
  GOOGLE_API_KEY: {{ .Values.config.google_gemini_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.google_vertex_project_id }}
  VERTEXAI_PROJECT: {{ .Values.config.google_vertex_project_id | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.google_vertex_location }}
  VERTEXAI_LOCATION: {{ .Values.config.google_vertex_location | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.deepseek_api_key }}
  DEEPSEEK_API_KEY: {{ .Values.config.deepseek_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.mistral_api_key }}
  MISTRAL_API_KEY: {{ .Values.config.mistral_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.azure_api_key }}
  AZURE_API_KEY: {{ .Values.config.azure_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.groq_api_key }}
  GROQ_API_KEY: {{ .Values.config.groq_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.openrouter_api_key }}
  OPENROUTER_API_KEY: {{ .Values.config.openrouter_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.custom_api_key }}
  CUSTOM_API_KEY: {{ .Values.config.custom_api_key | b64enc | quote }}
  {{- end }}