{{- if or .Values.config.gitlab_oauth_client_id .Values.config.gitlab_oauth_client_secret }}
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-app
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- if .Values.config.gitlab_oauth_client_id }}
  client-id: {{ .Values.config.gitlab_oauth_client_id | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.gitlab_oauth_client_secret }}
  client-secret: {{ .Values.config.gitlab_oauth_client_secret | b64enc | quote }}
  {{- end }}
{{- end }}