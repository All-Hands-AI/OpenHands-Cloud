apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation
  labels:
    app: automation
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: automation
  template:
    metadata:
      labels:
        app: automation
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: wait-for-db
        image: postgres:16
        command: ['sh', '-c']
        args:
          - |
            echo "Waiting for PostgreSQL at $AUTOMATION_DB_HOST to be ready..."
            until PGPASSWORD=$AUTOMATION_DB_PASS pg_isready -h $AUTOMATION_DB_HOST -p $AUTOMATION_DB_PORT -U $AUTOMATION_DB_USER > /dev/null 2>&1; do
              echo "PostgreSQL is unavailable - sleeping for 2 seconds"
              sleep 2
            done
            echo "PostgreSQL is up and running!"
        env:
        {{- include "automation.env" . | nindent 8 }}
      - name: create-db
        image: postgres:16
        command: ['sh', '-c']
        args:
          - |
            export PGPASSWORD=$AUTOMATION_DB_PASS
            PSQL="psql -h $AUTOMATION_DB_HOST -p $AUTOMATION_DB_PORT -U $AUTOMATION_DB_USER"
            echo "Ensuring database \"$AUTOMATION_DB_NAME\" exists..."
            $PSQL -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='$AUTOMATION_DB_NAME'" | grep -q 1 || \
            $PSQL -d postgres -c "CREATE DATABASE $AUTOMATION_DB_NAME;"
        env:
        {{- include "automation.env" . | nindent 8 }}
      - name: migrate
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
        command: ["alembic", "upgrade", "head"]
        env:
        {{- include "automation.env" . | nindent 8 }}
      containers:
      - name: automation
        imagePullPolicy: Always
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
        command: ["ddtrace-run"]
        args:
          - "uvicorn"
          - "automation.app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
        ports:
        - containerPort: 8000
        resources:
          {{- toYaml .Values.deployment.resources | nindent 12 }}
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
        env:
        {{- include "automation.env" . | nindent 8 }}
