{{- define "automation.env" }}
# OpenHands API base URL (for dispatching sandbox runs)
# Constructed from host config - automation talks to parent OpenHands service
{{- if and .Values.host .Values.prefixWithBranch }}
- name: AUTOMATION_OPENHANDS_API_BASE_URL
  value: "https://{{ .Values.branchSanitized }}.{{ .Values.host }}"
{{- else if .Values.host }}
- name: AUTOMATION_OPENHANDS_API_BASE_URL
  value: "https://{{ .Values.host }}"
{{- end }}
# Automation service base URL (for completion callbacks from sandboxes)
# Always deployed under /automation subpath
{{- if and .Values.host .Values.prefixWithBranch }}
- name: AUTOMATION_BASE_URL
  value: "https://{{ .Values.branchSanitized }}.{{ .Values.host }}/automation"
{{- else if .Values.host }}
- name: AUTOMATION_BASE_URL
  value: "https://{{ .Values.host }}/automation"
{{- end }}
# PostgreSQL database configuration
- name: AUTOMATION_DB_HOST
  value: {{ .Values.database.host | quote }}
- name: AUTOMATION_DB_PORT
  value: {{ .Values.database.port | quote }}
- name: AUTOMATION_DB_USER
  value: {{ .Values.database.user | quote }}
- name: AUTOMATION_DB_NAME
  value: {{ .Values.database.name | quote }}
- name: AUTOMATION_DB_PASS
  valueFrom:
    secretKeyRef:
      name: {{ .Values.database.secretName }}
      key: {{ .Values.database.secretKey }}
{{- if .Values.gcp.dbInstance }}
- name: AUTOMATION_GCP_DB_INSTANCE
  value: {{ .Values.gcp.dbInstance | quote }}
- name: AUTOMATION_GCP_PROJECT
  value: {{ .Values.gcp.project | quote }}
- name: AUTOMATION_GCP_REGION
  value: {{ .Values.gcp.region | quote }}
{{- end }}
# GCS bucket configuration
{{- if .Values.gcs.enabled }}
- name: GCS_BUCKET_NAME
  value: {{ .Values.gcs.bucket | quote }}
{{- end }}
# GCS Emulator configuration (for ephemeral/feature environments)
{{- if .Values.gcsEmulator.enabled }}
- name: STORAGE_EMULATOR_HOST
  value: "http://localhost:{{ .Values.gcsEmulator.port }}"
- name: GCS_BUCKET_NAME
  value: {{ .Values.gcsEmulator.bucket | quote }}
{{- end }}
# Admin API key for issuing per-user automation API keys
{{- if .Values.adminApiKeyFromSecret }}
- name: AUTOMATION_ADMIN_API_KEY
  valueFrom:
    secretKeyRef:
      name: {{ .Values.adminApiKeyFromSecret.name }}
      key: {{ .Values.adminApiKeyFromSecret.key }}
{{- end }}
# Service key for authenticating requests from OpenHands SaaS
{{- if .Values.serviceKeyFromSecret }}
- name: AUTOMATION_SERVICE_KEY
  valueFrom:
    secretKeyRef:
      name: {{ .Values.serviceKeyFromSecret.name }}
      key: {{ .Values.serviceKeyFromSecret.key }}
{{- end }}
# Datadog configuration
- name: DD_AGENT_HOST
  value: "datadog-agent.all-hands-system.svc.cluster.local"
- name: DD_TRACE_AGENT_PORT
  value: "8126"
- name: DD_SERVICE
  value: "automation"
- name: DD_ENV
  value: {{ .Values.datadog.env | quote }}
- name: DD_TRACE_ENABLED
  value: "true"
# Additional env vars
{{- if .Values.env }}
{{- range $key, $value := .Values.env }}
- name: {{ $key }}
  value: {{ $value | quote }}
{{- end }}
{{- end }}
{{- end }}
