image:
  repository: ghcr.io/openhands/automation
  # tag: main

imagePullSecrets: []

deployment:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

securityContext:
  runAsUser: 42420
  runAsGroup: 42420
  runAsNonRoot: true

serviceAccount:
  create: true
  name: automation-sa
  annotations: {}

probes:
  startup:
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# URL configuration
# OpenHands API URL for dispatching sandbox runs (e.g., https://staging.all-hands.dev)
openhandsApiUrl: ""
# Automation service base URL for completion callbacks (e.g., https://staging.all-hands.dev/api/automation)
automationBaseUrl: ""

# PostgreSQL database configuration
database:
  # Full hostname of the PostgreSQL server
  # Examples:
  #   - Cloud SQL: "my-project:us-central1:my-instance"
  #   - In-cluster: "openhands-main-postgresql"
  #   - Feature env: "openhands-feature-branch-postgresql"
  host: ""
  port: "5432"
  user: "automation_user"
  name: "automations"
  # Secret containing the automation database password
  secretName: "automation-db-secret"
  secretKey: "db-password"
  # Create database and user in an existing PostgreSQL instance
  # When true, runs an init container to create the database and user
  # Useful when sharing a PostgreSQL instance with other services
  createDatabaseUser: false
  # Secret containing the postgres superuser password (for creating the automation user)
  # Only used when createDatabaseUser=true
  superuserSecretName: "postgres-password"
  superuserSecretKey: "password"

# GCP Cloud SQL (leave empty for non-GCP)
gcp:
  dbInstance: ""
  project: ""
  region: ""

# File storage configuration
# Supports multiple backends: gcs, s3, or in-cluster S3-compatible storage
filestore:
  # When true, uses S3-compatible storage for ephemeral/feature environments
  # When false, uses cloud storage specified by 'type' (for production)
  ephemeral: false
  # Bucket name for storing automation data
  bucket: automation-data
  # Storage type when ephemeral=false (e.g., gcs, s3)
  type: gcs

# S3-compatible storage configuration (used when filestore.ephemeral=true)
# When deployed as subchart of openhands, these are passed from the parent chart
# When deployed standalone, consumers must provide their own S3-compatible endpoint
s3:
  endpoint: ""
  accessKey: ""
  secretKey: ""

# Service key from K8s secret (for staging/production)
# Used by OpenHands SaaS to authenticate requests to the automation service
serviceKeyFromSecret:
  name: automation-service-key
  key: automation-service-key

# Datadog configuration
datadog:
  env: "dev"

# Env vars passed directly to the container
env: {}

global:
  security:
    # This allows using the bitnamilegacy image repo
    allowInsecureImages: true
