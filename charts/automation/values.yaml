image:
  repository: ghcr.io/openhands/deploy-automation
  # tag: main

imagePullSecrets: []

deployment:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

securityContext:
  runAsUser: 42420
  runAsGroup: 42420
  runAsNonRoot: true

serviceAccount:
  create: true
  name: automation-sa
  annotations: {}

probes:
  startup:
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

ingress:
  enabled: false
  host: ""
  class: traefik
  prefixWithBranch: false
  annotations: {}

tls:
  enabled: false
  env: "dev"

# PostgreSQL database configuration
database:
  host: ""
  port: "5432"
  user: "automation_user"
  name: "automations"
  secretName: "automation-db-password"
  secretKey: "password"

# GCP Cloud SQL (leave empty for non-GCP)
gcp:
  dbInstance: ""
  project: ""
  region: ""

# Admin API key from K8s secret (for staging/production)
# Used by the automation service to issue per-user automation API keys
# For feature env, pass AUTOMATION_ADMIN_API_KEY via `env` instead
# adminApiKeyFromSecret:
#   name: automation-secrets
#   key: admin-api-key

# Datadog configuration
datadog:
  env: "dev"

# Env vars passed directly to the container
env: {}

# PostgreSQL subchart configuration (for ephemeral/feature environments)
# When enabled, deploys an in-cluster PostgreSQL instance
# Service name will be "{release-name}-postgresql", secret name also "{release-name}-postgresql"
postgresql:
  enabled: false
  auth:
    username: postgres
    database: automations
  primary:
    persistence:
      enabled: false
    initdb:
      scriptsConfigMap: ""
  service:
    ports:
      postgresql: 5432
  image:
    repository: bitnamilegacy/postgresql

global:
  security:
    # This allows using the bitnamilegacy image repo
    allowInsecureImages: true
