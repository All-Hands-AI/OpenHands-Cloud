image:
  repository: ghcr.io/openhands/automation
  # tag: main

imagePullSecrets: []

deployment:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

securityContext:
  runAsUser: 42420
  runAsGroup: 42420
  runAsNonRoot: true

serviceAccount:
  create: true
  name: automation-sa
  annotations: {}

probes:
  startup:
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# Automation service base URL (for completion callbacks from sandboxes)
# Must be provided by parent chart - automation is always deployed under a subpath
# Example: https://staging.all-hands.dev/automation
automationBaseUrl: ""

# OpenHands API base URL (where the automation service dispatches sandbox runs)
# Must be provided by parent chart
# Example: https://staging.all-hands.dev
openhandsApi:
  baseUrl: ""

# PostgreSQL database configuration
database:
  host: ""
  port: "5432"
  user: "automation_user"
  name: "automations"
  secretName: "automation-db-password"
  secretKey: "password"

# GCP Cloud SQL (leave empty for non-GCP)
gcp:
  dbInstance: ""
  project: ""
  region: ""

# GCS bucket storage configuration
# When enabled, provides GCS_BUCKET_NAME env var for the automation service
gcs:
  enabled: false
  bucket: ""

# GCS Emulator (fake-gcs-server) for ephemeral/feature environments
# When enabled, deploys fake-gcs-server as a sidecar and sets STORAGE_EMULATOR_HOST
# This allows the same GCS client code to work without connecting to real GCP
gcsEmulator:
  enabled: false
  image:
    repository: fsouza/fake-gcs-server
    tag: "1.49.0"
  bucket: "test-bucket"
  port: 4443
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m

# Service key from K8s secret (for staging/production)
# Used by OpenHands SaaS to authenticate requests to the automation service
serviceKeyFromSecret:
  name: automation-service-key
  key: automation-service-key

# Datadog configuration
datadog:
  env: "dev"

# Env vars passed directly to the container
env: {}

# PostgreSQL subchart configuration (for ephemeral/feature environments)
# When enabled, deploys an in-cluster PostgreSQL instance
# Service name will be "{release-name}-postgresql", secret name also "{release-name}-postgresql"
postgresql:
  enabled: false
  auth:
    username: postgres
    database: automations
  primary:
    persistence:
      enabled: false
    initdb:
      scriptsConfigMap: ""
  service:
    ports:
      postgresql: 5432
  image:
    repository: bitnamilegacy/postgresql

global:
  security:
    # This allows using the bitnamilegacy image repo
    allowInsecureImages: true
