image:
  repository: ghcr.io/openhands/automation
  # tag: main

imagePullSecrets: []

deployment:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# Temporal worker deployment configuration
# Workers process automation workflows by polling the Temporal task queue
worker:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

securityContext:
  runAsUser: 42420
  runAsGroup: 42420
  runAsNonRoot: true

serviceAccount:
  create: true
  name: automation-sa
  annotations: {}

probes:
  startup:
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# URL configuration
# OpenHands API URL for dispatching sandbox runs (e.g., https://staging.all-hands.dev)
openhandsApiUrl: ""
# Automation service base URL for completion callbacks (e.g., https://staging.all-hands.dev/api/automation)
automationBaseUrl: ""

# PostgreSQL database configuration
database:
  # Full hostname of the PostgreSQL server
  # Examples:
  #   - Cloud SQL: "my-project:us-central1:my-instance"
  #   - In-cluster: "openhands-main-postgresql"
  #   - Feature env: "openhands-feature-branch-postgresql"
  host: ""
  port: "5432"
  user: "automation_user"
  name: "automations"
  # Secret containing the automation database password
  secretName: "automation-db-secret"
  secretKey: "db-password"
  # Create database and user in an existing PostgreSQL instance
  # When true, runs an init container to create the database and user
  # Useful when sharing a PostgreSQL instance with other services
  createDatabaseUser: false
  # Secret containing the postgres superuser password (for creating the automation user)
  # Only used when createDatabaseUser=true
  superuserSecretName: "postgres-password"
  superuserSecretKey: "password"

# GCP Cloud SQL (leave empty for non-GCP)
gcp:
  dbInstance: ""
  project: ""
  region: ""

# File storage configuration (aligned with openhands chart pattern)
# Supports multiple backends: gcs, s3, or in-cluster minio for ephemeral environments
filestore:
  # When true, uses S3-compatible storage (minio) for ephemeral/feature environments
  # When false, uses cloud storage specified by 'type' (for production)
  ephemeral: false
  # Bucket name for storing automation data
  bucket: automation-data
  # Storage type when ephemeral=false (e.g., gcs, s3)
  type: gcs

# Minio configuration for ephemeral storage (filestore.ephemeral=true)
#
# Two deployment modes:
# 1. Standalone: Set minio.enabled=true to deploy minio as a subchart
# 2. Subchart of openhands: Set minio.enabled=false and configure minio.external
#    to use the parent chart's minio instance
minio:
  # Deploy minio as a subchart (for standalone deployments)
  # Set to false when deployed as subchart of openhands (uses parent's minio)
  enabled: false

  # External minio configuration (used when enabled=false but filestore.ephemeral=true)
  # Configure this to point to an existing minio instance (e.g., parent chart's minio)
  external:
    endpoint: "minio:9000"
    accessKey: "default"
    secretKey: "notasecret"

  # Minio subchart configuration (used when enabled=true)
  # These values are passed to the minio subchart
  replicas: 1
  mode: standalone
  persistence:
    enabled: false
  buckets:
    - name: automation-data
      policy: none
      purge: true
  svcaccts:
    - accessKey: "automationkey"
      secretKey: "automationsecret"
      user: root
  rootUser: "root"
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 100m

# Service key from K8s secret (for staging/production)
# Used by OpenHands SaaS to authenticate requests to the automation service
serviceKeyFromSecret:
  name: automation-service-key
  key: automation-service-key

# Datadog configuration
datadog:
  env: "dev"

# Env vars passed directly to the container
env: {}

# PostgreSQL subchart configuration (for ephemeral/feature environments)
# When enabled, deploys an in-cluster PostgreSQL instance
# Service name will be "{release-name}-postgresql", secret name also "{release-name}-postgresql"
postgresql:
  enabled: false
  auth:
    username: postgres
    database: automations
  primary:
    persistence:
      enabled: false
    initdb:
      scriptsConfigMap: ""
  service:
    ports:
      postgresql: 5432
  image:
    repository: bitnamilegacy/postgresql

# Temporal workflow engine configuration
# Temporal provides durable workflow execution for automation runs
#
# Two deployment modes:
# 1. Standalone: Set temporal.enabled=true to deploy Temporal as a subchart
# 2. External: Set temporal.enabled=false and configure temporal.external
#    to use an existing Temporal cluster
#
# When deployed as subchart of openhands:
#   - Temporal reuses the parent's PostgreSQL instance
#   - Set temporal.enabled=true with temporal.server.config.persistence pointing to parent DB
temporal:
  # Deploy Temporal as a subchart
  enabled: false

  # External Temporal configuration (used when enabled=false)
  # Configure this to point to an existing Temporal cluster
  external:
    host: "temporal-frontend"
    port: 7233
    namespace: "default"

  # Task queue for automation workflows
  taskQueue: "automations"

  # Temporal subchart configuration (used when enabled=true)
  # See: https://github.com/temporalio/helm-charts
  server:
    replicaCount: 1
    config:
      # Persistence configuration
      # Temporal requires two datastores: default and visibility
      persistence:
        defaultStore: default
        visibilityStore: visibility
        numHistoryShards: 128
        datastores:
          default:
            sql:
              pluginName: postgres12
              driverName: postgres12
              databaseName: temporal
              # connectAddr should be "host:port" format
              # Set this to your PostgreSQL instance (e.g., "my-postgresql:5432")
              connectAddr: ""
              user: temporal_user
              # Use existing secret for password
              existingSecret: temporal-db-secret
              secretKey: password
              # Create database and schema if not exists
              createDatabase: true
              manageSchema: true
              maxConns: 20
              maxIdleConns: 20
          visibility:
            sql:
              pluginName: postgres12
              driverName: postgres12
              databaseName: temporal_visibility
              # Same connectAddr as default store
              connectAddr: ""
              user: temporal_user
              existingSecret: temporal-db-secret
              secretKey: password
              createDatabase: true
              manageSchema: true
              maxConns: 10
              maxIdleConns: 10
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Temporal Admin Tools (includes temporal CLI)
  admintools:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # Temporal Web UI
  web:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

global:
  security:
    # This allows using the bitnamilegacy image repo
    allowInsecureImages: true
