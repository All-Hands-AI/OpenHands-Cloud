{{- if .Values.pluginDirectory.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin-directory
  labels:
    app: plugin-directory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plugin-directory
  template:
    metadata:
      labels:
        app: plugin-directory
    spec:
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # Server container (FastAPI backend)
        - name: server
          image: "{{ .Values.pluginDirectory.server.image.repository }}:{{ .Values.pluginDirectory.server.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
          env:
            - name: DB_HOST
              value: "{{ .Release.Name }}-postgresql"
            - name: DB_USER
              value: "{{ .Values.postgresql.auth.username }}"
            - name: DB_NAME
              value: "plugindir"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASS)@$(DB_HOST):5432/$(DB_NAME)"
            - name: MARKETPLACE_SOURCE
              value: {{ .Values.pluginDirectory.env.MARKETPLACE_SOURCE | quote }}
            - name: FEATURED_PLUGIN_IDS
              value: {{ .Values.pluginDirectory.env.FEATURED_PLUGIN_IDS | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.pluginDirectory.env.LOG_LEVEL | quote }}
            - name: IDENTITY_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pluginDirectory.auth.existingSecret }}
                  key: identity-shared-secret
          resources:
            {{- toYaml .Values.pluginDirectory.server.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

        # Client container (React Router SSR)
        - name: client
          image: "{{ .Values.pluginDirectory.client.image.repository }}:{{ .Values.pluginDirectory.client.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: APP_URL
              value: "https://{{ .Values.pluginDirectory.ingress.host }}"
            - name: IDENTITY_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pluginDirectory.auth.existingSecret }}
                  key: identity-shared-secret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pluginDirectory.auth.existingSecret }}
                  key: session-secret
            - name: AUTH_PROTOCOL
              value: "oidc"
            - name: OIDC_ISSUER_URL
              value: "{{ .Values.keycloak.url }}/realms/$(KEYCLOAK_REALM_NAME)"
            - name: KEYCLOAK_REALM_NAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-realm
                  key: realm-name
            - name: OIDC_CLIENT_ID
              value: "plugin-directory"
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pluginDirectory.auth.existingSecret }}
                  key: oidc-client-secret
          resources:
            {{- toYaml .Values.pluginDirectory.client.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
{{- end }}
