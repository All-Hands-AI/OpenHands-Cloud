{{- define "troubleshoot.supportBundle" -}}
apiVersion: troubleshoot.sh/v1beta2
kind: SupportBundle
metadata:
  name: {{ .Release.Name }}-support-bundle
spec:
  collectors: {{- include "troubleshoot.collectors.shared" .  | nindent 4 }}
    - secret:
        name: {{ .Release.Name }}-postgresql
        namespace: {{ .Release.Namespace }}
        key: postgres-password
        includeValue: false
    - secret:
        name: {{ .Release.Name }}-redis
        namespace: {{ .Release.Namespace }}
        key: redis-password
        includeValue: false
    - secret:
        name: sandbox-api-key
        namespace: {{ .Release.Namespace }}
        key: sandbox-api-key
        includeValue: false
    - secret:
        name: github-app
        namespace: {{ .Release.Namespace }}
        includeValue: false
    - secret:
        name: keycloak-realm
        namespace: {{ .Release.Namespace }}
        includeValue: false
    - logs:
        name: app/{{ .Release.Name }}/logs
        selector: 
          - app.kubernetes.io/name={{ .Release.Name }}
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 720h
    - logs:
        name: app/{{ .Release.Name }}-postgresql/logs
        selector: 
          - app.kubernetes.io/name=postgresql
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    - logs:
        name: app/{{ .Release.Name }}-redis/logs
        selector: 
          - app.kubernetes.io/name=redis
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    - logs:
        name: app/{{ .Release.Name }}-keycloak/logs
        selector: 
          - app.kubernetes.io/name=keycloak
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    - logs:
        name: app/{{ .Release.Name }}-minio/logs
        selector: 
          - app.kubernetes.io/name=minio
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    - logs:
        name: app/{{ .Release.Name }}-runtime-api/logs
        selector: 
          - app.kubernetes.io/name=runtime-api
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    - logs:
        name: ingress-nginx/logs
        selector: 
          - app.kubernetes.io/name=ingress-nginx
        namespace: ingress-nginx
        limits:
          maxAge: 168h
    {{- if .Values.postgresql.enabled }}
    - postgresql:
        collectorName: postgresql
        uri: postgresql://postgres:@{{ .Release.Name }}-postgresql:5432/openhands?sslmode=disable
        tls:
          disabled: true
        password:
          secretName: {{ .Release.Name }}-postgresql
          secretKey: postgres-password
    {{- end }}
    {{- if .Values.redis.enabled }}
    - redis:
        collectorName: redis
        uri: redis://{{ .Release.Name }}-redis-master:6379
        password:
          secretName: {{ .Release.Name }}-redis
          secretKey: redis-password
    {{- end }}
  analyzers: {{- include "troubleshoot.analyzers.shared" .  | nindent 4 }}
    - deploymentStatus:
        name: {{ .Release.Name }}
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands main deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands main deployment is ready"
    - deploymentStatus:
        name: {{ .Release.Name }}-integrations
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands integrations deployment is not ready"
          - warn:
              when: "< 2"
              message: "OpenHands integrations deployment is ready but not at full capacity"
          - pass:
              when: ">= 2"
              message: "OpenHands integrations deployment is ready"
    - deploymentStatus:
        name: {{ .Release.Name }}-mcp
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands MCP deployment is not ready"
          - warn:
              when: "< 2"
              message: "OpenHands MCP deployment is ready but not at full capacity"
          - pass:
              when: ">= 2"
              message: "OpenHands MCP deployment is ready"
    {{- if .Values.litellm.enabled }}
    - deploymentStatus:
        name: {{ .Release.Name }}-litellm
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands LiteLLM deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands LiteLLM deployment is ready"
    {{- end }}
    - deploymentStatus:
        name: {{ .Release.Name }}-minio
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands MinIO deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands MinIO deployment is ready"
    {{- if .Values.keycloak.enabled }}
    - deploymentStatus:
        name: {{ .Release.Name }}-keycloak
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Keycloak deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Keycloak deployment is ready"
    {{- end }}
    {{- if index .Values "runtime-api" "enabled" }}
    - deploymentStatus:
        name: {{ .Release.Name }}-runtime-api
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Runtime API deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Runtime API deployment is ready"
    {{- end }}
    {{- if .Values.postgresql.enabled }}
    - statefulsetStatus:
        name: {{ .Release.Name }}-postgresql
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands PostgreSQL statefulset is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands PostgreSQL statefulset is ready"
    {{- end }}
    {{- if .Values.redis.enabled }}
    - statefulsetStatus:
        name: {{ .Release.Name }}-redis-master
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Redis statefulset is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Redis statefulset is ready"
    {{- end }}
    {{- if .Values.keycloak.enabled }}
    - statefulsetStatus:
        name: {{ .Release.Name }}-keycloak
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Keycloak statefulset is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Keycloak statefulset is ready"
    {{- end }}
    {{- if .Values.migrationJob.enabled }}
    - jobStatus:
        name: migrate-db
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "== false"
              message: "OpenHands database migration job failed"
          - pass:
              when: "== true"
              message: "OpenHands database migration job completed successfully"
    {{- end }}
    {{- if .Values.keycloak.enabled }}
    - jobStatus:
        name: keycloak-config
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "== false"
              message: "OpenHands Keycloak configuration job failed"
          - warn:
              when: "== incomplete"
              message: "OpenHands Keycloak configuration job is still running"
          - pass:
              when: "== true"
              message: "OpenHands Keycloak configuration job completed successfully"
    {{- end }}
    {{- if index .Values "runtime-api" "enabled" }}
    - jobStatus:
        name: {{ .Release.Name }}-runtime-api-migrate-db
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "== false"
              message: "OpenHands Runtime API database migration job failed"
          - pass:
              when: "== true"
              message: "OpenHands Runtime API database migration job completed successfully"
    {{- end }}
    - deploymentStatus:
        name: ingress-nginx-controller
        namespace: ingress-nginx
        outcomes:
          - fail:
              when: "< 1"
              message: "Ingress NGINX controller deployment is not ready"
          - pass:
              when: ">= 1"
              message: "Ingress NGINX controller deployment is ready"
    {{- if .Values.postgresql.enabled }}
    - postgresql:
        checkName: "PostgreSQL Database Health"
        collectorName: postgresql
        outcomes:
          - fail:
              when: "connected == false"
              message: "Cannot connect to PostgreSQL database"
          - fail:
              when: "version == \"\""
              message: "PostgreSQL version could not be determined"
          - warn:
              when: "version < 12.0.0"
              message: "PostgreSQL version is older than recommended (12.0.0+)"
          - pass:
              when: "connected == true"
              message: "PostgreSQL database is healthy"
    {{- end }}
    {{- if .Values.redis.enabled }}
    - redis:
        checkName: "Redis Cache Health"
        collectorName: redis
        outcomes:
          - fail:
              when: "connected == false"
              message: "Cannot connect to Redis server"
          - fail:
              when: "version == \"\""
              message: "Redis version could not be determined"
          - warn:
              when: "version < 6.0.0"
              message: "Redis version is older than recommended (6.0.0+)"
          - pass:
              when: "connected == true"
              message: "Redis server is healthy"
    {{- end }}
{{- end -}}
