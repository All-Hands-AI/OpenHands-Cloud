{{- define "troubleshoot.supportBundle" -}}
apiVersion: troubleshoot.sh/v1beta2
kind: SupportBundle
metadata:
  name: {{ .Release.Name }}-support-bundle
spec:
  collectors: {{- include "troubleshoot.collectors.shared" .  | nindent 4 }}
    - secret:
        name: {{ .Release.Name }}-postgresql
        namespace: {{ .Release.Namespace }}
        key: postgres-password
        includeValue: false
    - secret:
        name: {{ .Release.Name }}-valkey
        namespace: {{ .Release.Namespace }}
        key: valkey-password
        includeValue: false
    - secret:
        name: sandbox-api-key
        namespace: {{ .Release.Namespace }}
        key: sandbox-api-key
        includeValue: false
    - secret:
        name: github-app
        namespace: {{ .Release.Namespace }}
        includeValue: false
    - secret:
        name: keycloak-realm
        namespace: {{ .Release.Namespace }}
        includeValue: false
    # OpenHands main application logs
    - logs:
        name: app/openhands/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app=openhands
        limits:
          maxAge: 720h
    # OpenHands integrations deployment logs
    - logs:
        name: app/openhands-integrations/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app=openhands-integrations
        limits:
          maxAge: 720h
    # OpenHands MCP deployment logs
    - logs:
        name: app/openhands-mcp/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app=openhands-mcp
        limits:
          maxAge: 720h
    {{- if .Values.cnpg.enabled }}
    # PostgreSQL logs (CNPG)
    - logs:
        name: app/oh-main-postgresql/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - cnpg.io/cluster=oh-main-postgresql
        limits:
          maxAge: 168h
    {{- end }}
    {{- if .Values.valkey.enabled }}
    # Valkey logs
    - logs:
        name: app/{{ .Release.Name }}-valkey/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=valkey
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    {{- if .Values.keycloak.enabled }}
    # Keycloak logs (Bitnami chart)
    - logs:
        name: app/{{ .Release.Name }}-keycloak/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=keycloak
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    {{- if .Values.filestore.ephemeral }}
    # MinIO logs (MinIO chart)
    - logs:
        name: app/{{ .Release.Name }}-minio/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app=minio
          - release={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    {{- if index .Values "runtime-api" "enabled" }}
    # Runtime API logs
    - logs:
        name: app/{{ .Release.Name }}-runtime-api/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=runtime-api
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    {{- if or .Values.litellm.enabled (and (index .Values "litellm-helm") (index .Values "litellm-helm" "enabled")) }}
    # LiteLLM logs
    - logs:
        name: app/{{ .Release.Name }}-litellm/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=litellm
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    # Ingress NGINX controller logs
    - logs:
        name: ingress-nginx/logs
        selector:
          - app.kubernetes.io/name=ingress-nginx
        namespace: ingress-nginx
        limits:
          maxAge: 168h
    {{- if .Values.cnpg.enabled }}
    - postgresql:
        collectorName: postgresql
        uri: postgresql://postgres:@oh-main-postgresql-rw:5432/openhands?sslmode=disable
        tls:
          disabled: true
        password:
          secretName: {{ .Values.cnpg.superuserSecret | default "postgres-password" }}
          secretKey: password
    {{- end }}
    {{- if .Values.valkey.enabled }}
    - redis:
        collectorName: valkey
        uri: redis://{{ .Release.Name }}-valkey:6379
        password:
          secretName: {{ .Release.Name }}-valkey
          secretKey: valkey-password
    {{- end }}
  analyzers: {{- include "troubleshoot.analyzers.shared" .  | nindent 4 }}
    - deploymentStatus:
        name: openhands
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands main deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands main deployment is ready"
    - deploymentStatus:
        name: openhands-integrations
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands integrations deployment is not ready"
          - warn:
              when: "< 2"
              message: "OpenHands integrations deployment is ready but not at full capacity"
          - pass:
              when: ">= 2"
              message: "OpenHands integrations deployment is ready"
    - deploymentStatus:
        name: openhands-mcp
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands MCP deployment is not ready"
          - warn:
              when: "< 2"
              message: "OpenHands MCP deployment is ready but not at full capacity"
          - pass:
              when: ">= 2"
              message: "OpenHands MCP deployment is ready"
    {{- if or .Values.litellm.enabled (and (index .Values "litellm-helm") (index .Values "litellm-helm" "enabled")) }}
    - deploymentStatus:
        name: {{ .Release.Name }}-litellm
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands LiteLLM deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands LiteLLM deployment is ready"
    {{- end }}
    {{- if .Values.filestore.ephemeral }}
    - deploymentStatus:
        name: {{ .Release.Name }}-minio
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands MinIO deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands MinIO deployment is ready"
    {{- end }}
    {{- if index .Values "runtime-api" "enabled" }}
    - deploymentStatus:
        name: {{ .Release.Name }}-runtime-api
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Runtime API deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Runtime API deployment is ready"
    {{- end }}
    {{- if .Values.cnpg.enabled }}
    - statefulsetStatus:
        name: oh-main-postgresql-1
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands PostgreSQL (CNPG) is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands PostgreSQL (CNPG) is ready"
    {{- end }}
    {{- if .Values.valkey.enabled }}
    - deploymentStatus:
        name: {{ .Release.Name }}-valkey
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Valkey deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Valkey deployment is ready"
    {{- end }}
    {{- if .Values.keycloak.enabled }}
    - statefulsetStatus:
        name: keycloak
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Keycloak statefulset is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Keycloak statefulset is ready"
    {{- end }}
    - deploymentStatus:
        name: ingress-nginx-controller
        namespace: ingress-nginx
        outcomes:
          - fail:
              when: "< 1"
              message: "Ingress NGINX controller deployment is not ready"
          - pass:
              when: ">= 1"
              message: "Ingress NGINX controller deployment is ready"
    {{- if .Values.cnpg.enabled }}
    - postgresql:
        checkName: "PostgreSQL Database Health"
        collectorName: postgresql
        outcomes:
          - fail:
              when: "connected == false"
              message: "Cannot connect to PostgreSQL database"
          - fail:
              when: "version == \"\""
              message: "PostgreSQL version could not be determined"
          - pass:
              when: "connected == true"
              message: "PostgreSQL database is healthy"
    {{- end }}
    {{- if .Values.valkey.enabled }}
    - redis:
        checkName: "Valkey Cache Health"
        collectorName: valkey
        outcomes:
          - fail:
              when: "connected == false"
              message: "Cannot connect to Valkey server"
          - fail:
              when: "version == \"\""
              message: "Valkey version could not be determined"
          - pass:
              when: "connected == true"
              message: "Valkey server is healthy"
    {{- end }}
{{- end -}}
