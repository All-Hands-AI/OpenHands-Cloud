{{/*
  For exposing the Laminar app server gRPC externally on GCP.
  gRPC requires HTTP/2 and uses a separate subdomain (grpc.*) on port 443.
  Uses h2c backend protocol via traefik.
*/}}
{{- if and .Values.laminar.enabled (and (eq .Values.laminar.global.cloudProvider "gcp") .Values.laminar.appServer.ingress.hostname) }}
{{- $hostname := .Values.laminar.appServer.ingress.hostname }}
{{- $grpcHostname := printf "grpc.%s" $hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laminar-app-server-grpc-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/hostname: {{ $grpcHostname }}
    traefik.ingress.kubernetes.io/backend-protocol: h2c
    {{- with .Values.laminar.appServer.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.laminar.appServer.ingress.className | default "traefik" }}
  tls:
    - hosts:
        - {{ $grpcHostname }}
      secretName: laminar-app-server-grpc-tls
  rules:
    - host: {{ $grpcHostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laminar-app-server-service
                port:
                  number: {{ .Values.laminar.appServer.grpcPort | default 8001 }}
{{- end }}