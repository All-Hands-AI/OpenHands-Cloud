apiVersion: v1
kind: Service
metadata:
  name: openhands-mcp-service
  labels:
    {{- include "openhands.componentLabels" (dict "context" . "component" "mcp") | nindent 4 }}
    app: openhands-mcp
spec:
  ports:
  - name: openhands-mcp
    port: 3000
    protocol: TCP
    targetPort: 3000
  selector:
    {{- include "openhands.componentSelectorLabels" (dict "context" . "component" "mcp") | nindent 4 }}
  type: ClusterIP