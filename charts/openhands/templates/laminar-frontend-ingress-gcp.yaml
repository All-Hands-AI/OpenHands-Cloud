{{/*
  TEMPORARY WORKAROUND: This ingress uses external-dns to create DNS records automatically.
  This is a temporary solution for testing until a manual DNS A record can be created
  to map the ingress hostname to a fixed IP for the laminar frontend service.
  TODO: Remove this template once manual DNS is configured.
*/}}
{{- $hostname := .Values.laminar.frontend.ingress.hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laminar-frontend-gcp-ingress
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ $hostname }}
    {{- with .Values.laminar.frontend.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.laminar.frontend.ingress.className | default "gce" }}
  rules:
    - host: {{ $hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laminar-frontend-service
                port:
                  number: {{ .Values.laminar.frontend.service.port | default 80 }}
