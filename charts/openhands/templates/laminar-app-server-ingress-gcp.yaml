{{/*
  Ingress for laminar app-server API with TLS support via cert-manager.
  Used for trace ingestion from external services (e.g., runtime pods in other clusters).
*/}}
{{- if and .Values.laminar.enabled (and (eq .Values.laminar.global.cloudProvider "gcp") .Values.laminar.appServer.ingress.hostname) }}
{{- $hostname := .Values.laminar.appServer.ingress.hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laminar-app-server-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/hostname: {{ $hostname }}
    {{- with .Values.laminar.appServer.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.laminar.appServer.ingress.className | default "traefik" }}
  tls:
    - hosts:
        - {{ $hostname }}
      secretName: laminar-app-server-tls
  rules:
    - host: {{ $hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laminar-app-server-service
                port:
                  number: {{ .Values.laminar.appServer.service.port | default 8000 }}
{{- end }}
