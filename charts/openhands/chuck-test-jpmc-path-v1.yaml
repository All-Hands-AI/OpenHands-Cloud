image:
  tag: sha-f75141a

deployment:
  replicas: 1

integrationEvents:
  deployment:
    replicas: 1

mcpEvents:
  deployment:
    replicas: 1

allowedUsers:
  - rbren
  - xingyaoww
  - neubig
  - amanape
  - tofarr
  - lucasreed
  - mamoodi
  - anthrocypher
  - malhotra5
  - raymyers
  - chuck@all-hands.dev
  - all-hands-bot

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::941377112440:role/chucktest-core-app-openhands-sa-role

filestore:
  ephemeral: false
  bucket: 941377112440-chucktest-core-app-openhands-sessions
  type: s3
  provider: aws

runtime:
  runAsRoot: false
  # image:
  #   tag: 3c5023ac021cfc075f2d6b5ff7f345f375bded47-nikolaik

ingress:
  enabled: true
  host: "app.chucktest.aws.all-hands.dev"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt

certificate:
  enabled: true
  name: runtime
  namespace: openhands
  secretName: runtime-tls
  issuer: letsencrypt
  domains:
    - "runtime.chucktest.aws.all-hands.dev"

# Enable the TLSStore for Traefik to use the wildcard certificate as default
tlsStore:
  enabled: true
  name: default
  secretName: runtime-tls

tls:
  enabled: true

github:
  enabled: true

enterpriseSSO:
  enabled: true

sandbox:
  apiHostname: https://runtime-api.chucktest.aws.all-hands.dev

env:
  AGENT_SERVER_IMAGE_REPOSITORY: "ghcr.io/openhands/agent-server"
  AGENT_SERVER_IMAGE_TAG: "0eeb044-python"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_USERS_PAGE: "true"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_BILLING_PAGE: "true"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_INTEGRATIONS_PAGE: "true"
  OH_WEB_CLIENT_FEATURE_FLAGS_ENABLE_BILLING: "false"
  OH_WEB_CLIENT_FEATURE_FLAGS_ENABLE_JIRA: "false"
  OH_APP_CONVERSATION_INFO_KIND: "server.utils.saas_app_conversation_info_injector.SaasAppConversationInfoServiceInjector"
  CONVERSATION_MANAGER_CLASS: "server.saas_nested_conversation_manager.SaasNestedConversationManager"
  OPENHANDS_PROVIDER_BASE_URL: "https://llm-proxy.eval.all-hands.dev/"
  v: "true"
  ENABLE_V1_SLACK_RESOLVER: "false"
  ENABLE_V1_GITHUB_RESOLVER: "false"
  # This var will cause the openhands deploy to create the LLM team name if it doesn't exist already
  #LITE_LLM_TEAM_NAME: openhands
  LITELLM_DEFAULT_MODEL: "litellm_proxy/claude-opus-4-5-20251101"
  #LITE_LLM_API_URL: "http://openhands-litellm:4000"
  #LITE_LLM_TEAM_ID: "f8bdfe75-9f9b-43ee-b992-e85cdf08ec35"
  # LITE_LLM_API_URL: "URL"
  # LITE_LLM_TEAM_ID: "teamId"
  # RUN_AS_OPENHANDS: "true"
  # CONVERSATION_MANAGER_CLASS: "server.saas_nested_conversation_manager.SaasNestedConversationManager"
  MAX_CONCURRENT_CONVERSATIONS: "10"
  # RUNTIME_URL_PATTERN: "https://{runtime_id}.runtime.chucktest.aws.all-hands.dev"
  RUNTIME_URL_PATTERN: "https://runtime.chucktest.aws.all-hands.dev/{runtime_id}"
  RUNTIME_ROUTING_MODE: "path"
  DISABLE_WAITLIST: "true"
  #LOG_LEVEL: "DEBUG"
  #DEBUG: "true"
  # RUNTIME_USERNAME: "cbutkus"
  # RUNTIME_UID: 1000
  OH_WEBHOOKS_0_BASE_URL: https://app.chucktest.aws.all-hands.dev/api/v1/webhooks
  DEFAULT_INITIAL_BUDGET: "20.0"
  OH_AGENT_SERVER_ENV: '{"UV_DEFAULT_INDEX": "https://your-custom-pypi.example.com/simple/"}'

litellm:
  enabled: true
  teamId: "openhands"
  url: "http://openhands-litellm:4000"

postgresql:
  enabled: true
  primary:
    resourcesPreset: "medium"
    persistence:
      enabled: false

keycloak:
  enabled: true
  replicaCount: 1
  ingress:
    enabled: true
    hostname: "auth.app.chucktest.aws.all-hands.dev"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt

litellm-helm:
  # Set this to false if you are using your own litellm instance
  enabled: true
  ingress:
    hosts:
      - host: llm-proxy.chucktest.aws.all-hands.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: llm-proxy-tls
        hosts:
          - llm-proxy.chucktest.aws.all-hands.dev
  proxy_config:
    environment_variables:
      {
        "OR_APP_NAME": "OpenHands",
        "OR_SITE_URL": "https://docs.all-hands.dev",
      }
    # Needs to be updated with your models. If you bring your own litellm, then just point at that!
    model_list:
      - model_name: "claude-opus-4-5-20251101"
        litellm_params:
          model: "anthropic/claude-opus-4-5-20251101"
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: "claude-sonnet-4-5-20250929"
        litellm_params:
          model: "anthropic/claude-sonnet-4-5-20250929"
          api_key: os.environ/ANTHROPIC_API_KEY
    litellm_settings:
      default_max_budget: null

runtime-api:
  enabled: true
  # image:
  #   tag: sha-ad2657f
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::941377112440:role/chucktest-core-app-openhands-sa-role
  ingress:
    enabled: true
    host: runtime-api.chucktest.aws.all-hands.dev
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
  env:
    RUNTIME_BASE_URL: "runtime.chucktest.aws.all-hands.dev"
    STORAGE_CLASS: "gp2"
    RUN_AS_OPENHANDS: "true"
    RUNTIME_DISABLE_SSL: "false"
    SU_TO_USER: "false"
    RUNTIME_ROUTING_MODE: "path"
    RUNTIME_URL_SEPARATOR: "/"
    USE_GATEWAY_API: "true"                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
    GATEWAY_NAME: "runtime-gateway"
  autoscaling:
    minReplicas: 1
    maxReplicas: 1
  warmRuntimes:
    count: 1
    configs:
      - name: default
        image: "ghcr.io/openhands/runtime:3c5023ac021cfc075f2d6b5ff7f345f375bded47-nikolaik"
        working_dir: "/openhands/code/"
        environment:
          CONVERSATION_MANAGER_CLASS: "openhands.server.conversation_manager.standalone_conversation_manager.StandaloneConversationManager"
          SERVE_FRONTEND: "0"
          RUNTIME: "local"
          USER: "openhands"
          PERMITTED_CORS_ORIGINS: "https://app.chucktest.aws.all-hands.dev"
          port: "60000"
          WORK_PORT_1: "12000"
          WORK_PORT_2: "12001"
          ALLOW_SET_CONVERSATION_ID: "1"
          FILE_STORE_PATH: "/workspace/.openhands/file_store"
          WORKSPACE_BASE: "/workspace/project"
          WORKSPACE_MOUNT_PATH_IN_SANDBOX: "/workspace/project"
          SANDBOX_CLOSE_DELAY: "0"
          SKIP_DEPENDENCY_CHECK: "1"
          INITIAL_NUM_WARM_SERVERS: "1"
          INIT_GIT_IN_EMPTY_WORKSPACE: "1"
          ENABLE_V1: "0"
          SU_TO_USER: "false"
          DISABLE_VSCODE_PLUGIN: "false"
          BROWSERGYM_DOWNLOAD_DIR: "/workspace/.downloads/"
          PLAYWRIGHT_BROWSERS_PATH: "/opt/playwright-browsers"
          WEB_HOST: "app.chucktest.aws.all-hands.dev"
          FILE_STORE_WEB_HOOK_URL: "https://app.chucktest.aws.all-hands.dev/event-webhook/batch"
          FILE_STORE_WEB_HOOK_BATCH: "1"
        command:
          - "/openhands/micromamba/bin/micromamba"
          - "run"
          - "-n"
          - "openhands"
          - "poetry"
          - "run"
          - "python"
          - "-u"
          - "-m"
          - "openhands.server"
          - "60000"
          - "--working-dir"
          - "/workspace"
          - "--plugins"
          - "agent_skills"
          - "jupyter"
          - "vscode"
          - "--username"
          - "openhands"
          - "--user-id"
          - "1000"
      - name: v1_current
        image: "ghcr.io/openhands/agent-server:1.14.0-python"
        working_dir: "/workspace"
        environment:
          SU_TO_USER: "false"
          LOG_JSON: "1"
          LOG_JSON_LEVEL_KEY: severity
          OH_ALLOW_CORS_ORIGINS_0: https://app.chucktest.aws.all-hands.dev
          OH_BASH_EVENTS_DIR: /workspace/bash_events
          OH_CONVERSATIONS_PATH: /workspace/conversations
          OH_ENABLE_VNC: "0"
          OH_VSCODE_PORT: "60001"
          OH_WEBHOOKS_0_BASE_URL: https://app.chucktest.aws.all-hands.dev/api/v1/webhooks
          OPENVSCODE_SERVER_ROOT: /openhands/.openvscode-server
          VSCODE_PORT: "60001"
          WORKER_1: "12000"
          WORKER_2: "12001"
          UV_DEFAULT_INDEX: "https://your-custom-pypi.example.com/simple/"
        command:
          - /usr/local/bin/openhands-agent-server
          - --port
          - "60000"
        run_as_user: 10001
        run_as_group: 10001
        fs_group: 10001