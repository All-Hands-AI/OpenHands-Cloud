image:
  repository: ghcr.io/all-hands-ai/enterprise-server
  tag: sha-a92f7a9

deployment:
  replicas: 1

allowedUsers:
  - rbren
  - xingyaoww
  - neubig
  - amanape
  - tofarr
  - lucasreed
  - mamoodi
  - anthrocypher
  - malhotra5
  - raymyers
  - chuck@all-hands.dev
  - all-hands-bot

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::941377112440:role/openhands_sa_role

filestore:
  ephemeral: false
  bucket: 941377112440-chuck-test-core-app-openhands-sessions
  type: s3

runtime:
  runAsRoot: true
  image:
    tag: e21d0b13a443841872df6a4d039537bd01fa5494-nikolaik

ingress:
  enabled: true
  host: "app.chuck-test.aws.all-hands.dev"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt

certificate:
  enabled: true
  name: runtime
  namespace: openhands
  secretName: runtime-tls
  issuer: letsencrypt
  domains:
    - "*.runtime.chuck-test.aws.all-hands.dev"

# Enable the TLSStore for Traefik to use the wildcard certificate as default
tlsStore:
  enabled: true
  name: default
  secretName: runtime-tls

tls:
  enabled: true

github:
  enabled: true

sandbox:
  apiHostname: https://runtime-api.chuck-test.aws.all-hands.dev

env:
  DB_USER: openhands_user
  DB_ADMIN_USER: db_admin
  DB_NAME: openhands
  DB_HOST: "aurora-db-cluster.cluster-cncccu0eg498.us-east-1.rds.amazonaws.com"
  DB_PORT: 5432
  DB_AUTH_TYPE: rds-iam
  DB_SCHEMA: main
  AWS_REGION: us-east-1
  # This var will cause the openhands deploy to create the LLM team name if it doesn't exist already
  LITE_LLM_TEAM_NAME: openhands
  LITELLM_DEFAULT_MODEL: "litellm_proxy/claude-sonnet-4-20250514"
  ENABLE_ENTERPRISE_SSO: "true"
  # LITE_LLM_API_URL: "URL"
  # LITE_LLM_TEAM_ID: "teamId"
  # RUN_AS_OPENHANDS: "true"
  CONVERSATION_MANAGER_CLASS: "server.saas_nested_conversation_manager.SaasNestedConversationManager"
  MAX_CONCURRENT_CONVERSATIONS: "10"
  # RUNTIME_URL_PATTERN: "https://runtime.chuck-test.aws.all-hands.dev/{runtime_id}"
  DISABLE_WAITLIST: "false"
  LOG_LEVEL: "DEBUG"
  DEBUG: "true"
  # RUNTIME_USERNAME: "cbutkus"
  # RUNTIME_UID: 1000

litellm:
  enabled: true
  teamId: "68845e11-848a-403a-8f5d-766cd170a2a7"
  url: "https://llm-proxy.eval.all-hands.dev"

postgresql:
  enabled: false
  primary:
    persistence:
      enabled: true

externalDatabase:
  enabled: true

keycloak:
  enabled: true
  replicaCount: 1
  externalDatabase:
    existingSecret: keycloak-db-secret
    existingSecretHostKey: db-host
    existingSecretPortKey: db-port
    existingSecretUserKey: db-user
    existingSecretPasswordKey: db-password
    existingSecretDatabaseKey: db-name
  # externalDatabase:
  #   host: oh-main-postgresql
  ingress:
    enabled: true
    hostname: "auth.app.chuck-test.aws.all-hands.dev"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
  extraEnvVars:
    - name: KC_FEATURES
      value: token-exchange,admin-fine-grained-authz
    - name: KC_DB
      value: postgres
    - name: KC_DB_URL
      value: "jdbc:postgresql://aurora-db-cluster.cluster-cncccu0eg498.us-east-1.rds.amazonaws.com:5432/keycloak?ssl=true&sslmode=verify-full&sslrootcert=/mnt/rds-certs/global-bundle.pem"
    - name: KC_DB_USERNAME
      value: keycloak_user
    - name: KC_DB_PASSWORD_FILE
      value: /var/run/secrets/rds/token
  extraVolumes:
    - name: db-token
      emptyDir: {}
    - name: rds-ca
      configMap:
        name: rds-ca-bundle # We'll create this ConfigMap with the PEM
  extraVolumeMounts:
    - name: db-token
      mountPath: /var/run/secrets/rds
    - name: rds-ca
      mountPath: /mnt/rds-certs
      readOnly: true
  sidecars:
    - name: rds-iam-token-sidecar
      image: amazon/aws-cli:2.17.28 # <-- AWS CLI official image
      volumeMounts:
        - name: db-token
          mountPath: /var/run/secrets/rds
        - name: rds-ca
          mountPath: /mnt/rds-certs
          readOnly: true
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            aws rds generate-db-auth-token \
              --hostname aurora-db-cluster.cluster-cncccu0eg498.us-east-1.rds.amazonaws.com \
              --port 5432 \
              --region us-east-1 \
              --username keycloak_user > /var/run/secrets/rds/token
            sleep 600
          done

litellm-helm:
  # Set this to false if you are using your own litellm instance
  enabled: false
  ingress:
    hosts:
      - host: llm-proxy.chuck-test.aws.all-hands.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: llm-proxy-tls
        hosts:
          - llm-proxy.chuck-test.aws.all-hands.dev
  proxy_config:
    environment_variables:
      {
        "OR_APP_NAME": "OpenHands",
        "OR_SITE_URL": "https://docs.all-hands.dev",
      }
    # Needs to be updated with your models. If you bring your own litellm, then just point at that!
    model_list:
      - model_name: "prod/claude-3-5-sonnet-20241022"
        litellm_params:
          model: "anthropic/claude-3-5-sonnet-20241022"
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: "prod/claude-3-7-sonnet-20250219"
        litellm_params:
          model: "anthropic/claude-3-7-sonnet-20250219"
          api_key: os.environ/ANTHROPIC_API_KEY

runtime-api:
  enabled: false
  image:
    tag: sha-4f4977a
  ingress:
    enabled: true
    host: runtime-api.chuck-test.aws.all-hands.dev
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
  externalDatabase:
    enabled: true
  env:
    DB_HOST: "applicationdb.cncccu0eg498.us-east-1.rds.amazonaws.com"
    DB_USER: runtime_api_user
    DB_NAME: runtime_api
    DB_ADMIN_USER: db_admin
    RUNTIME_BASE_URL: "runtime.chuck-test.aws.all-hands.dev"
    STORAGE_CLASS: "gp2"
    RUN_AS_OPENHANDS: "false"
    RUNTIME_DISABLE_SSL: "false"
    # RUNTIME_ROUTING_MODE: "path"
    # RUNTIME_URL_SEPARATOR: "/"
    # USE_GATEWAY_API: "true"
    # GATEWAY_NAME: "runtime-gateway"
  autoscaling:
    minReplicas: 1
    maxReplicas: 2
  warmRuntimes:
    count: 1
    configs:
      - name: default
        image: "ghcr.io/all-hands-ai/runtime:e21d0b13a443841872df6a4d039537bd01fa5494-nikolaik"
        working_dir: "/openhands/code/"
        environment:
          ALLOW_SET_CONVERSATION_ID: "1"
          CONVERSATION_MANAGER_CLASS: "openhands.server.conversation_manager.standalone_conversation_manager.StandaloneConversationManager"
          FILE_STORE_PATH: "/workspace/.openhands/file_store"
          FILE_STORE_WEB_HOOK_BATCH: "1"
          FILE_STORE_WEB_HOOK_URL: "https://app.chuck-test.aws.all-hands.dev/event-webhook/batch"
          INITIAL_NUM_WARM_SERVERS: "1"
          INIT_GIT_IN_EMPTY_WORKSPACE: "1"
          PERMITTED_CORS_ORIGINS: "https://app.chuck-test.aws.all-hands.dev"
          RUNTIME: "local"
          SANDBOX_CLOSE_DELAY: "0"
          SERVE_FRONTEND: "0"
          SKIP_DEPENDENCY_CHECK: "1"
          USER: "root"
          WEB_HOST: "app.chuck-test.aws.all-hands.dev"
          WORKSPACE_BASE: "/workspace/project"
          WORKSPACE_MOUNT_PATH_IN_SANDBOX: "/workspace/project"
          WORK_PORT_1: "12000"
          WORK_PORT_2: "12001"
          port: "60000"
          DEBUG: "true"
        command:
          - /openhands/micromamba/bin/micromamba
          - run
          - -n
          - openhands
          - poetry
          - run
          - python
          - -u
          - -m
          - openhands.server
          - "60000"
          - --working-dir
          - /workspace
          - --plugins
          - agent_skills
          - jupyter
          - vscode
          - --username
          - root
          - --user-id
          - "0"
