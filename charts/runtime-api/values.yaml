nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/openhands/runtime-api
  tag: sha-7857be8
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-login-secret

serviceAccount:
  create: true
  name: runtime-api-sa
  annotations: {}
  createRBAC: true

runtimeInSameCluster: false
defaultAPIKeySecretName: default-api-key

service:
  type: ClusterIP
  port: 5000

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  DEV_MODE: "false"
  ARTIFACT_REGISTRY_REPOSITORY: "runtime-api-docker-repo"
  ARTIFACT_REGISTRY_LOCATION: "us-central1"
  GCP_REGION: "us-central1"
  STORAGE_CLASS: "standard-rwo"
  INCLUDE_START_PROBE: "true"
  INCLUDE_LIVENESS_PROBE: "true"
  RUNTIME_CLASS: "sysbox-runc"

resources:
  limits:
    cpu: 1
    memory: 4Gi
  requests:
    cpu: 100m
    memory: 100Mi

# Unified job settings for both jobs and cronjobs
jobSettings:
  # Resource configuration
  resources:
    limits:
      cpu: 1
      memory: 3Gi
    requests:
      cpu: 100m
      memory: 100Mi
  # Timeout settings (30 minutes)
  activeDeadlineSeconds: 1800
  # History limits
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2

nodeSelector: {}

securityContext: {}

tolerations: []

affinity: {}

# PostgreSQL database configuration
# PostgreSQL database configuration
database:
  # Hostname of the PostgreSQL server
  host: "oh-main-postgresql-rw"
  # Port of the PostgreSQL server
  port: "5432"
  # Database user
  user: "postgres"
  # Database name
  name: "runtime_api_db"
  # Name of the Kubernetes secret containing the database password
  secretName: "postgres-password"
  # Key within the secret that holds the password
  secretKey: "password"
  # Create the database if it does not exist
  createDatabases: false
  # Run database migrations on startup
  migrate: true
  # Create database user if it does not exist
  create: false
  # Name of the secret containing credentials for user creation
  createJobSecretName: "runtime-api-db-credentials"
  poolSize:
    api: 5
    cronjobs: 2
  maxOverflow:
    api: 10
    cronjobs: 5

helm-release-pruner:
  enabled: false
  job:
    schedule: "0 */4 * * *"
    dryRun: False
  pruneProfiles:
    - olderThan: "1 days ago"
      helmReleaseFilter: "^runtime-api-.*$"
      namespaceFilter: "^runtime-api-.*$"
      maxReleasesToKeep: 10

certificate:
  enabled: false

ingress:
  enabled: false
  host: chart-example.local
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  path: /
  pathType: Prefix
  tls: true

# Base ingress configuration for runtime ingress inheritance
# Only metadata (labels and annotations) will be inherited, not the spec
ingressBase:
  enabled: false
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: base-ingress
    labels:
      app: runtime-api
      environment: production
      team: platform
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75

cleanup:
  enabled: true
  schedule: "*/5 * * * *"
  idle_seconds: 1200 # Default to 20 minutes
  dead_seconds: 86400 # Default to 1 day

warmRuntimes:
  enabled: false
  configMapName: warm-runtimes-config
  count: 0
  configs:
    - name: default
      image: "ghcr.io/openhands/runtime:cloud-1.19.0-nikolaik"
      working_dir: "/openhands/code/"
      environment: {}
      command:
        - /openhands/micromamba/bin/micromamba
        - run
        - -n
        - openhands
        - poetry
        - run
        - python
        - -u
        - -m
        - openhands.runtime.action_execution_server
        - "60000"
        - --working-dir
        - /workspace
        - --plugins
        - agent_skills
        - jupyter
        - vscode
        - --username
        - root
        - --user-id
        - "0"

# Database cleanup CronJob configuration
dbCleanup:
  enabled: true
  schedule: "0 0 * * *" # Run daily at midnight
  retentionDays: 90 # Number of days to retain runtime objects

# Test API Keys cleanup CronJob configuration
testKeysCleanup:
  enabled: false # Disabled by default, enabled only in feature and staging environments
  schedule: "0 0 * * *" # Run daily at midnight
  retentionDays: 2 # Number of days to retain test API keys

# Pod Status Logger configuration
podStatusLogger:
  enabled: true
  schedule: "*/5 * * * *" # Run every 5 minutes

monitoring:
  enabled: false

datadog:
  enabled: false
  env: "dev"

replicated:
  enabled: false

