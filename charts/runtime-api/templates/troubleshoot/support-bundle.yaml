{{- define "runtime.troubleshoot.supportBundle" -}}
apiVersion: troubleshoot.sh/v1beta2
kind: SupportBundle
metadata:
  name: {{ .Release.Name }}-support-bundle
spec:
  collectors: {{- include "runtime.troubleshoot.collectors.shared" .  | nindent 4 }}
    # Runtime API application logs
    - logs:
        name: app/{{ include "runtime-api.fullname" . }}/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name={{ include "runtime-api.name" . }}
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 720h
  analyzers: {{- include "runtime.troubleshoot.analyzers.shared" .  | nindent 4 }}
    - deploymentStatus:
        name: {{ include "runtime-api.fullname" . }}
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "Runtime API deployment is not ready"
          - pass:
              when: ">= 1"
              message: "Runtime API deployment is ready"
{{- end -}}
