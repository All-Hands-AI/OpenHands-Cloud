{{- define "runtime-api.env" }}
{{- range $key, $value := .Values.env }}
- name: {{ $key }}
  value: {{ $value | quote }}
{{- end }}
- name: DB_HOST
  value: {{ .Values.database.host | quote }}
- name: DB_PORT
  value: {{ .Values.database.port | quote }}
- name: DB_USER
  value: {{ .Values.database.user | quote }}
- name: DB_NAME
  value: {{ .Values.database.name | quote }}
- name: RUNTIME_DEAD_SECONDS
  value: {{ printf "%.0f" .Values.cleanup.dead_seconds | quote }}
{{- if .Values.runtimeInSameCluster }}
- name: RUNTIME_IN_SAME_CLUSTER
  value: "true"
{{- end }}
{{- if .Values.ingressBase.enabled }}
- name: INGRESS_BASE
  value: "/ingress-base/base-ingress.yaml"
{{- end }}
{{- if .Values.certificate.enabled }}
- name: RUNTIME_CERT_SECRET
  value: {{ .Values.certificate.secretName }}
{{- end }}
{{- if .Values.datadog.enabled }}
# Datadog environment variables
- name: DD_AGENT_HOST
  value: "datadog-agent.all-hands-system.svc.cluster.local"
- name: DD_TRACE_AGENT_PORT
  value: "8126"
- name: DD_DOGSTATSD_PORT
  value: "8125"
- name: DD_SERVICE
  value: "runtime-api"
- name: DD_ENV
  value: {{ .Values.datadog.env | default "dev" | quote }}
- name: DD_LOGS_INJECTION
  value: "true"
- name: DD_TRACE_ENABLED
  value: "true"
- name: DD_TRACE_SAMPLING_RULES
  value: '[{"resource": "GET /health", "sample_rate": 0.0}, {"resource": "GET /internal/metrics", "sample_rate": 0.0}]'
{{- end }}
- name: DB_PASS
  valueFrom:
    secretKeyRef:
      name: {{ .Values.database.secretName }}
      key: {{ .Values.database.secretKey }}
{{- end }}
